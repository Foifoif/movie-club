<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Club</title>
<meta property="og:title" content="Movie Club" />
<meta property="og:description" content="Ratings, history, and bracket for our movie club" />
<meta property="og:image" content="https://amovieclub.com/movieclub.png" />
<meta property="og:url" content="https://amovieclub.com" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<!-- No Google Fonts — using system fonts: Georgia (logo) + Calibri (everything else) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --ink: #12101e;
    --paper: #f7f5f2;
    --cream: #eeeadc;
    --red: #c0392b;
    --yellow: #f5c518;
    --yellow-glow: rgba(245,197,24,0.18);
    --blue: #8ec5e6;       /* baby blue */
    --blue-mid: #5dacd4;   /* medium baby blue for borders/hover */
    --blue-dark: #2a6a8a;  /* deeper blue for contrast */
    --green: #27a860;
    --bg: #0e0c16;
    --bg2: #15132a;
    --text-on-dark: #d8d3ee;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #F0EAD6;
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .site-header {
    background: transparent;
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    cursor: pointer;
    user-select: none;
    text-decoration: none;
  }

  /* Logo circle wrapper clips the zoomed image */
  .logo-circle {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    overflow: hidden;
    border: 2.5px solid var(--yellow);
    flex-shrink: 0;
    transition: transform 0.18s;
    cursor: pointer;
  }

  .logo-circle:hover {
    transform: scale(1.06);
  }

  .logo-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.22);
    transform-origin: center;
    display: block;
  }

  .nav {
    display: flex;
    gap: 8px;
  }

  /* ── Liquid-glass nav buttons ── */
  .nav-btn {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--ink);
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(18px) saturate(1.9);
    -webkit-backdrop-filter: blur(18px) saturate(1.9);
    border: 1px solid rgba(255, 255, 255, 0.65);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    padding: 7px 18px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .nav-btn:hover {
    background: rgba(255, 255, 255, 0.65);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    transform: translateY(-1px);
  }

  .nav-btn.active {
    background: rgba(245, 197, 24, 0.22);
    border-color: rgba(245, 197, 24, 0.55);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    color: #7a5f00;
  }

  /* Icon/label visibility */
  .nav-icon { display: none; line-height: 1; }
  .nav-label { display: inline; }

  /* ── Mobile: smaller logo + tighter nav ── */
  @media (max-width: 600px) {
    .logo-circle {
      width: 52px;
      height: 52px;
    }
    .nav {
      gap: 5px;
    }
    .nav-btn {
      font-size: 0.78rem;
      padding: 6px 10px;
    }
  }

  /* ── Mobile scrolled: collapse to icon-only ── */
  @media (max-width: 600px) {
    .header-scrolled .nav-btn {
      padding: 8px 10px;
    }
    .header-scrolled .nav-label { display: none; }
    .header-scrolled .nav-icon { display: flex; align-items: center; justify-content: center; }
  }

  /* MAIN */
  .main { padding: 20px 16px 80px; max-width: 480px; margin: 0 auto; }

  /* HOME — two movies side by side */
  .home-movies-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* Slightly tighter card chrome inside the grid */
  .home-movies-grid .movie-card {
    margin-bottom: 0;
    display: flex;
    flex-direction: column;
  }
  /* movie-info grows to fill card height, pushing streaming + rating to bottom */
  .home-movies-grid .movie-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px 10px 12px;
  }
  /* description expands to fill the gap between year and streaming section */
  .home-movies-grid .movie-desc {
    flex: 1;
    font-size: 0.8rem;
    margin-bottom: 14px;
  }
  .home-movies-grid .movie-card-accent { padding: 4px 10px; }
  .home-movies-grid .now-showing-text { letter-spacing: 3px; font-size: 0.46rem; }
  .home-movies-grid .poster-frame { margin: 6px 8px 0; padding: 5px; }
  .home-movies-grid .movie-title { font-size: 1.05rem; }
  .home-movies-grid .movie-year { font-size: 0.75rem; }
  .home-movies-grid .home-rating-box { padding: 8px 10px 10px; }
  .home-movies-grid .home-add-btn { font-size: 0.82rem; padding: 3px 10px; }
  .home-movies-grid .home-rating-form { gap: 6px; }
  .home-movies-grid .form-select { font-size: 0.88rem; padding: 5px 6px; }
  .home-movies-grid .home-save-btn { font-size: 0.82rem; padding: 5px 10px; }

  /* HOME PAGE */
  .page-title {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 2rem;
    color: var(--ink);
    margin-bottom: 4px;
    line-height: 1.1;
    letter-spacing: 0.5px;
  }

  .page-subtitle {
    font-size: 0.95rem;
    font-weight: 400;
    color: #7a6e58;
    margin-bottom: 24px;
    letter-spacing: 0.5px;
  }

  .movie-card {
    background: white;
    border: 2px solid var(--blue);
    border-radius: 6px;
    margin-bottom: 28px;
    overflow: hidden;
    box-shadow: 4px 4px 0 var(--yellow);
    position: relative;
  }

  /* Marquee accent strip */
  .movie-card-accent {
    background: var(--bg);
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .now-showing-bar {
    flex: 1;
    height: 1px;
    opacity: 0.5;
  }

  .now-showing-text {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 0.52rem;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
  }

  /* Theater poster frame */
  .poster-frame {
    margin: 10px 12px 0;
    padding: 7px;
    background: var(--bg);
    border: 2px solid var(--yellow);
    box-shadow:
      0 0 0 4px var(--bg),
      0 0 0 6px rgba(142,197,230,0.25),
      0 0 22px rgba(245,197,24,0.1);
    position: relative;
  }

  /* Corner brackets */
  .frame-corner {
    position: absolute;
    width: 14px;
    height: 14px;
    pointer-events: none;
    z-index: 3;
  }
  .fc-tl { top: 3px; left: 3px;   border-top: 2px solid var(--blue); border-left:  2px solid var(--blue); }
  .fc-tr { top: 3px; right: 3px;  border-top: 2px solid var(--blue); border-right: 2px solid var(--blue); }
  .fc-bl { bottom: 3px; left: 3px;  border-bottom: 2px solid var(--blue); border-left:  2px solid var(--blue); }
  .fc-br { bottom: 3px; right: 3px; border-bottom: 2px solid var(--blue); border-right: 2px solid var(--blue); }

  .movie-poster-wrap {
    position: relative;
    aspect-ratio: 2/3;
    overflow: hidden;
    background: #0a0814;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .movie-poster-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .poster-placeholder {
    font-size: 4rem;
    opacity: 0.2;
  }

  .movie-number {
    position: absolute;
    top: 10px;
    left: 10px;
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 3rem;
    line-height: 1;
    opacity: 0.12;
    color: white;
  }

  .movie-info { padding: 16px 16px 14px; }

  .movie-title {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 4px;
    color: var(--ink);
  }

  .movie-year {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--blue-mid);
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  .movie-desc {
    font-size: 0.95rem;
    line-height: 1.5;
    color: #555;
    margin-bottom: 14px;
  }

  .where-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #aaa;
    margin-bottom: 6px;
  }

  .streaming-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    font-size: 0.85rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1.5px solid;
  }

  .loading-card {
    background: white;
    border: 3px solid var(--ink);
    border-radius: 8px;
    padding: 40px 20px;
    text-align: center;
    box-shadow: 5px 5px 0 var(--ink);
    margin-bottom: 24px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid var(--cream);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* RATINGS PAGE */
  .ratings-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border: 3px solid var(--ink);
    border-radius: 8px;
    overflow: hidden;
  }

  .ratings-tab {
    flex: 1;
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 8px 4px;
    background: white;
    border: none;
    cursor: pointer;
    border-right: 2px solid var(--ink);
    transition: all 0.15s;
  }

  .ratings-tab:last-child { border-right: none; }
  .ratings-tab.active { background: var(--blue); color: white; }

  .movie-rating-card {
    background: white;
    border: 2px solid var(--blue);
    border-radius: 6px;
    margin-bottom: 20px;
    overflow: hidden;
    box-shadow: 3px 3px 0 var(--yellow);
  }

  .rating-card-header {
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--cream);
  }

  .rating-movie-title {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 1.2rem;
    line-height: 1.2;
  }

  .avg-badge {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--yellow);
    border: 2px solid var(--ink);
    white-space: nowrap;
    color: var(--ink);
  }

  .rating-scale-label {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #999;
    padding: 0 16px 8px;
  }

  .member-ratings { padding: 0 16px 12px; }

  .member-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px dashed var(--cream);
  }

  .member-row:last-child { border-bottom: none; }

  .member-name {
    font-size: 1.05rem;
    font-weight: 600;
  }

  .member-score {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 1.1rem;
  }

  .stars-display {
    display: flex;
    gap: 2px;
  }

  /* ALL TIME LIST */
  .alltime-item {
    background: white;
    border: 2px solid var(--blue);
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 3px 3px 0 var(--yellow);
  }

  .rank-num {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 2rem;
    line-height: 1;
    min-width: 36px;
    text-align: center;
  }

  .rank-1 { color: #b8860b; }
  .rank-2 { color: #888; }
  .rank-3 { color: #cd7f32; }

  .alltime-info { flex: 1; }

  .alltime-title {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 1.1rem;
    line-height: 1.2;
    margin-bottom: 2px;
  }

  .alltime-meta {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 0.75rem;
    color: #888;
  }

  .alltime-score {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--blue-mid);
  }

  /* BRACKET PAGE */
  .bracket-status {
    background: var(--ink);
    color: var(--yellow);
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 1.1rem;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 20px;
    border: 3px solid var(--yellow);
  }

  .voter-select {
    margin-bottom: 20px;
  }

  .voter-label {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #7a6e58;
    margin-bottom: 6px;
  }

  .voter-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .voter-btn {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 20px;
    border: 2px solid var(--ink);
    background: white;
    cursor: pointer;
    transition: all 0.15s;
  }

  .voter-btn.selected {
    background: var(--ink);
    color: var(--yellow);
  }

  .matchup-card {
    background: white;
    border: 3px solid var(--ink);
    border-radius: 8px;
    margin-bottom: 20px;
    overflow: hidden;
    box-shadow: 5px 5px 0 var(--ink);
    position: relative;
  }

  @keyframes matchup-fly-down {
    0%   { transform: scale(1)     translateY(0);     box-shadow: 5px 5px 0 var(--ink);            opacity: 1; }
    18%  { transform: scale(1.04)  translateY(-14px); box-shadow: 0 22px 55px rgba(0,0,0,0.28);   opacity: 1; }
    88%  { transform: scale(1.01)  translateY(480px); box-shadow: 0 6px 18px rgba(0,0,0,0.1);     opacity: 0.55; }
    100% { transform: scale(1)     translateY(500px); box-shadow: 5px 5px 0 var(--ink);            opacity: 0; }
  }
  @keyframes matchup-land {
    0%   { opacity: 0; transform: translateY(-18px) scale(0.97); }
    55%  { opacity: 1; transform: translateY(5px)   scale(1.01); }
    100% { opacity: 1; transform: translateY(0)     scale(1);    }
  }
  .matchup-card-flying {
    z-index: 100;
    animation: matchup-fly-down 0.72s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    pointer-events: none;
  }
  .matchup-card-landing {
    animation: matchup-land 0.38s ease-out;
  }

  .matchup-header {
    padding: 8px 16px;
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #999;
    border-bottom: 2px solid var(--cream);
  }

  .matchup-options { padding: 8px 12px 12px; display: flex; flex-direction: row; gap: 8px; align-items: stretch; }

  .matchup-vs {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 0.85rem;
    color: var(--red);
    padding: 0 2px;
    flex-shrink: 0;
  }

  .vote-btn {
    width: 100%;
    padding: 14px 16px;
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 1.2rem;
    border: 3px solid var(--ink);
    border-radius: 8px;
    background: var(--cream);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .vote-btn:hover { background: var(--yellow); transform: translateX(3px); }
  .vote-btn.voted { background: var(--green); color: white; border-color: var(--green); box-shadow: 3px 3px 0 var(--ink); }
  .vote-btn.lost { opacity: 0.4; }

  .vote-btn-h {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 6px;
    border: 2px solid #ddd;
    border-radius: 6px;
    background: white;
    cursor: pointer;
    transition: all 0.15s;
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    min-width: 0;
    gap: 3px;
  }
  .vote-btn-h:hover:not(:disabled) { border-color: var(--yellow); background: rgba(255,224,78,0.15); }
  .vote-btn-h.voted { background: var(--green); color: white; border-color: var(--green); }
  .vote-btn-h.lost { opacity: 0.45; }

  .vote-count {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 0.85rem;
    background: rgba(0,0,0,0.15);
    border-radius: 10px;
    padding: 2px 8px;
  }

  /* ADMIN */
  .admin-overlay {
    position: fixed;
    inset: 0;
    background: rgba(18,16,30,0.5);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .admin-sheet {
    background: white;
    border-radius: 16px 16px 0 0;
    border: 2px solid var(--blue);
    border-bottom: none;
    box-shadow: 0 -4px 32px rgba(0,0,0,0.1), -3px 0 0 var(--yellow), 3px 0 0 var(--yellow);
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 20px 16px 40px;
    color: var(--ink);
  }

  .admin-title {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 2px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .admin-subtitle {
    font-size: 0.85rem;
    color: #7a6e58;
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    margin-bottom: 18px;
  }

  .admin-close-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #aaa;
    padding: 5px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .admin-close-btn:hover { color: var(--ink); background: rgba(0,0,0,0.07); }

  .form-label {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #7a6e58;
    margin-bottom: 4px;
    display: block;
  }

  /* CONFIRM DELETE MODAL */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(18,16,30,0.55);
    z-index: 400;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
  }

  .confirm-card {
    background: white;
    border: 2px solid var(--blue);
    border-radius: 10px;
    padding: 24px 20px 20px;
    max-width: 300px;
    width: 100%;
    box-shadow: 4px 4px 0 var(--yellow);
  }

  .confirm-card-title {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .confirm-card-body {
    font-family: Calibri, Candara, 'Segoe UI', Optima, sans-serif;
    font-size: 0.88rem;
    color: #4a4435;
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .confirm-actions {
    display: flex;
    gap: 10px;
  }

function getTriviaOfTheWeek() {
  const weekNum = Math.floor(Date.now() / (7 * 24 * 60 * 60 * 1000));
  return TRIVIA_BANK[weekNum % TRIVIA_BANK.length];
}

const ACCENT_COLORS = ['#d63a2f','#2563b8','#2a7a3b','#e8621a','#7c3aed','#b8860b'];

function avg(arr) {
  const nums = arr.filter(n => n > 0);
  if (!nums.length) return null;
  return (nums.reduce((a,b) => a+b, 0) / nums.length).toFixed(1);
}

function ScaleIcon({ theme }) {
  const icons = {
    berets: '🎩', stars: '⭐', skulls: '💀', tacos: '🌮', flames: '🔥', cups: '☕', bombs: '💣'
  };
  return icons[theme] || '⭐';
}

function renderScaleEmoji(theme, count) {
  const icons = {
    berets: '🎩', stars: '⭐', skulls: '💀', tacos: '🌮', flames: '🔥', cups: '☕', bombs: '💣'
  };
  const icon = icons[theme] || '⭐';
  return Array.from({length: count}, (_,i) => icon).join('');
}

function rowToMovie(row) {
  return {
    id: row.id,
    title: row.title,
    year: row.year,
    description: row.description,
    poster: row.poster,
    streaming: Array.isArray(row.streaming) ? row.streaming : [],
    accent: row.accent || ACCENT_COLORS[0],
    ratingScale: row.rating_scale || '',
    sessionTheme: row.session_theme || '',
    shownMonth: row.shown_month || '',
    // Derive type from movie_type column if it exists, else fall back to accent color:
    // gold (#f5c518) = impromptu, anything else = official
    movieType: row.movie_type || (row.accent === '#f5c518' ? 'impromptu' : 'official'),
  };
}

async function loadAll() {
  const [moviesRes, ratingsRes, bracketRes, membersRes] = await Promise.all([
    sb.from('movies').select('*').order('id'),
    sb.from('ratings').select('*'),
    sb.from('bracket').select('data').eq('id', 1).maybeSingle(),
    sb.from('members').select('id, name, sort_order').order('sort_order').order('name'),
  ]);

  const allMovies = moviesRes.data || [];
  const currentMovies = allMovies.filter(m => !m.archived).map(rowToMovie);
  // Attach theme/month by insertion order (sorted by id asc = same order as load_data.py)
  const alltimeOrdered = allMovies
    .filter(m => m.archived)
    .sort((a, b) => a.id - b.id)
    .map((row, i) => {
      const meta = HISTORY_META[i];
      return {
        id: row.id,
        title: row.title,
        year: row.year,
        ratingScale: row.rating_scale || '',
        avgScore: row.avg_score,
        poster: row.poster || null,
        // For HISTORY_META movies: theme = the per-movie theme label
        // For new movies: use ratingScale as the label
        theme: meta?.theme || row.rating_scale || '',
        month: meta?.month || row.shown_month || '',
        // sessionTheme only populated for new (non-HISTORY_META) movies
        sessionTheme: meta ? '' : (row.session_theme || ''),
        movieType: row.movie_type || (row.accent === '#f5c518' ? 'impromptu' : 'official'),
      };
    });
  const alltimeMovies = [...alltimeOrdered].sort((a, b) => (b.avgScore || 0) - (a.avgScore || 0));

  const ratingsData = {};
  for (const row of (ratingsRes.data || [])) {
    if (!ratingsData[row.movie_id]) ratingsData[row.movie_id] = {};
    ratingsData[row.movie_id][row.member_name] = row.score;
  }

  const bracketData = bracketRes.data ? bracketRes.data.data : null;
  const membersData = (membersRes.data || []).map(r => r.name);
  const memberObjectsData = (membersRes.data || []).map(r => ({ id: r.id, name: r.name }));
  const pollsData = await dbLoadPolls().catch(() => []);
  const bracketHistoryData = await dbLoadBracketHistory().catch(() => []);

  return { currentMovies, ratingsData, bracketData, membersData, memberObjectsData, alltimeMovies, pollsData, bracketHistoryData };
}

async function dbSaveMovies(existingMovies, newMovieData) {
  const saved = [];
  for (let i = 0; i < newMovieData.length; i++) {
    const m = newMovieData[i];
    const row = {
      title: m.title,
      year: m.year || null,
      description: m.description || null,
      poster: m.poster || null,
      streaming: m.streaming || [],
      accent: m.accent || null,
      rating_scale: m.ratingScale || '',
      session_theme: m.sessionTheme || null,
      archived: false,
    };
    const existing = existingMovies[i];
    if (existing && existing.id) {
      const { data, error } = await sb.from('movies').update(row).eq('id', existing.id).select().single();
      if (error) throw error;
      saved.push(rowToMovie(data));
    } else {
      const { data, error } = await sb.from('movies').insert(row).select().single();
      if (error) throw error;
      saved.push(rowToMovie(data));
    }
  }
  return saved;
}

async function dbLoadPolls() {
  try {
    const { data: pollsData, error } = await sb.from('polls').select('*').order('created_at', { ascending: false });
    if (error || !pollsData || pollsData.length === 0) return [];
    const pollIds = pollsData.map(p => p.id);
    const [{ data: optData }, { data: voteData }] = await Promise.all([
      sb.from('poll_options').select('*').in('poll_id', pollIds).order('created_at'),
      sb.from('poll_votes').select('*').in('poll_id', pollIds),
    ]);
    return pollsData.map(poll => ({
      ...poll,
      options: (optData || []).filter(o => o.poll_id === poll.id),
      votes: (voteData || []).filter(v => v.poll_id === poll.id),
    }));
  } catch(e) { return []; }
}

async function dbCreatePoll(question, createdBy) {
  const { data, error } = await sb.from('polls').insert({ question, created_by: createdBy || null, is_active: true }).select().single();
  if (error) {
    if (error.message && (error.message.includes('schema cache') || error.message.includes("table 'public.polls'"))) {
      throw new Error("Polls aren't set up yet — run the SQL setup in Supabase first (see code comments).");
    }
    throw error;
  }
  return { ...data, options: [], votes: [] };
}

async function dbAddOptionAndVote(pollId, text, memberName, currentPoll, imageUrl) {
  const trimmed = text.trim();
  const existing = (currentPoll.options || []).find(o => o.text.toLowerCase() === trimmed.toLowerCase());
  let optionId;
  let newOptions = [...(currentPoll.options || [])];

  if (existing) {
    optionId = existing.id;
  } else {
    // Try with image_url first; fall back without it if the column doesn't exist yet
    let insertPayload = { poll_id: pollId, text: trimmed, image_url: imageUrl || null };
    let { data: newOpt, error } = await sb.from('poll_options').insert(insertPayload).select().single();
    if (error && error.message && error.message.includes('image_url')) {
      const fallback = await sb.from('poll_options').insert({ poll_id: pollId, text: trimmed }).select().single();
      if (fallback.error) throw fallback.error;
      newOpt = fallback.data;
    } else if (error) {
      throw error;
    }
    optionId = newOpt.id;
    newOptions = [...newOptions, newOpt];
  }

  await dbVoteForOption(pollId, optionId, memberName);

  const newVotes = (currentPoll.votes || []).filter(v => v.member_name !== memberName);
  newVotes.push({ poll_id: pollId, option_id: optionId, member_name: memberName });
  return { optionId, updatedPoll: { ...currentPoll, options: newOptions, votes: newVotes } };
}

async function dbArchiveMovies(movies, ratingsData) {
  const now = new Date();
  const shownMonth = now.toLocaleString('default', { month: 'long', year: 'numeric' });
  const archived = [];
  for (const m of movies) {
    const scores = Object.values(ratingsData[m.id] || {}).filter(v => v > 0);
    if (!scores.length) continue;
    const average = parseFloat(avg(scores));
    const { error } = await sb.from('movies')
      .update({ archived: true, avg_score: average, shown_month: shownMonth })
      .eq('id', m.id);
    if (error) throw error;
    archived.push({
      id: m.id, title: m.title, year: m.year,
      ratingScale: m.ratingScale, sessionTheme: m.sessionTheme || '',
      avgScore: average, month: shownMonth, theme: m.ratingScale || '',
    });
  }
  return archived;
}

async function dbRecalcAvg(movieId) {
  const { data } = await sb.from('ratings').select('score').eq('movie_id', movieId);
  if (!data || !data.length) return null;
  const sum = data.reduce((s, r) => s + parseFloat(r.score), 0);
  const rounded = Math.round((sum / data.length) * 100) / 100;
  await sb.from('movies').update({ avg_score: rounded }).eq('id', movieId);
  return rounded;
}

async function dbAddHistoryMovie({ title, year, description, poster, movieType, sessionTheme }) {
  const now = new Date();
  const shownMonth = now.toLocaleString('default', { month: 'long', year: 'numeric' });
  // Use accent color to encode type — no extra DB column needed:
  //   '#f5c518' (gold)  = impromptu
  //   '#8ec5e6' (blue)  = official
  const accent = movieType === 'impromptu' ? '#f5c518' : '#8ec5e6';
  const row = {
    title, year: year || null, description: description || null,
    poster: poster || null, streaming: [], accent,
    rating_scale: '', archived: true, avg_score: null,
    session_theme: sessionTheme || null,
  };
  // Add shown_month only if the column exists (graceful degradation)
  try { row.shown_month = shownMonth; } catch(_) {}
  const { data, error } = await sb.from('movies').insert(row).select().single();
  if (error) throw error;
  return { ...data, shownMonth, movieType };
}

// ─── MOVIE NIGHT HELPERS ─────────────────────────────────────────────────────
function getFourthSunday(year, month) {
  let count = 0;
  for (let d = 1; d <= 31; d++) {
    const dt = new Date(year, month, d);
    if (dt.getMonth() !== month) break;
    if (dt.getDay() === 0 && ++count === 4) return dt;
  }
  return null;
}

function getNextMovieNight(override) {
  if (override) return new Date(override);
  const now = new Date();
  let year = now.getFullYear(), month = now.getMonth();
  for (let i = 0; i < 3; i++) {
    const sun = getFourthSunday(year, month);
    if (sun) {
      // 9 AM PST = 17:00 UTC
      const ev = new Date(Date.UTC(sun.getFullYear(), sun.getMonth(), sun.getDate(), 17, 0, 0));
      if (ev > now) return ev;
    }
    month++;
    if (month > 11) { month = 0; year++; }
  }
  return new Date();
}

function fmtEventDate(d) {
  const datePart = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  const timePart = d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', timeZoneName:'short' });
  return `${datePart} · ${timePart}`;
}

function calcCountdown(target) {
  const diff = target - Date.now();
  if (diff <= 0) return { days:0, hours:0, minutes:0, done:true };
  return {
    days:    Math.floor(diff / 86400000),
    hours:   Math.floor((diff % 86400000) / 3600000),
    minutes: Math.floor((diff % 3600000)  / 60000),
    done: false
  };
}

// ─── MOVIE NIGHT COUNTDOWN ───────────────────────────────────────────────────
function getNearbyHoliday(date) {
  var y = date.getFullYear();
  var DAYS = 7;
  var near = function(h) { return Math.abs(date - h) / 864e5 <= DAYS; };
  var nthWeekday = function(yr, mo, wday, n) {
    var d = new Date(yr, mo, 1);
    var first = (wday - d.getDay() + 7) % 7;
    return new Date(yr, mo, 1 + first + (n - 1) * 7);
  };
  var lastMonday = function(yr, mo) {
    var last = new Date(yr, mo + 1, 0);
    return new Date(yr, mo, last.getDate() - (last.getDay() === 0 ? 6 : last.getDay() - 1));
  };

  var fixed = [
    [0,  1,  "New Year's Day",    "🎉"],
    [1,  14, "Valentine's Day",   "❤️"],
    [2,  17, "St. Patrick's Day", "☘️"],
    [6,  4,  "Independence Day",  "🎆"],
    [9,  31, "Halloween",         "🎃"],
    [11, 25, "Christmas",         "🎄"],
    [11, 31, "New Year's Eve",    "🥂"],
  ];
  for (var i = 0; i < fixed.length; i++) {
    if (near(new Date(y, fixed[i][0], fixed[i][1]))) return fixed[i][3] + ' Near ' + fixed[i][2];
  }
  if (near(nthWeekday(y, 4, 0, 2)))  return "💐 Near Mother's Day";    // 2nd Sun of May
  if (near(nthWeekday(y, 5, 0, 3)))  return "👨‍👧 Near Father's Day";   // 3rd Sun of Jun
  if (near(nthWeekday(y, 10, 4, 4))) return "🦃 Near Thanksgiving";    // 4th Thu of Nov
  if (near(lastMonday(y, 4)))         return "🎖️ Near Memorial Day";    // last Mon of May
  if (near(nthWeekday(y, 8, 1, 1)))  return "🌿 Near Labor Day";       // 1st Mon of Sep
  return null;
}

function MovieNightCountdown() {
  const [override, setOverride] = useState(null);
  const [tick,     setTick]     = useState(0);
  const [joinUrl,  setJoinUrl]  = useState('');

  const eventDate   = getNextMovieNight(override);
  const cd          = calcCountdown(eventDate);

  useEffect(() => {
    (async () => {
      const [ov, url] = await Promise.all([dbLoadOverride(), dbLoadJoinUrl()]);
      setOverride(ov);
      setJoinUrl(url || '');
    })();
  }, []);

  useEffect(() => {
    const t = setInterval(() => setTick(n => n + 1), 60000);
    return () => clearInterval(t);
  }, []);

  const pad = n => String(n).padStart(2, '0');

  return (
    <div className="mn-card">
      <div className="mn-eyebrow">🎬 Next Movie "Night"</div>
      <div className="mn-date">{fmtEventDate(eventDate)}</div>

      {cd.done ? (
        <div className="mn-happening">It's happening — enjoy! 🍿</div>
      ) : (
        <div className="mn-countdown">
          <div className="mn-unit"><span className="mn-val">{cd.days}</span><span className="mn-lbl">days</span></div>
          <span className="mn-sep">:</span>
          <div className="mn-unit"><span className="mn-val">{pad(cd.hours)}</span><span className="mn-lbl">hrs</span></div>
          <span className="mn-sep">:</span>
          <div className="mn-unit"><span className="mn-val">{pad(cd.minutes)}</span><span className="mn-lbl">min</span></div>
        </div>
      )}

      {(cd.days === 0 || cd.done) && joinUrl && (
        <a className="mn-join-btn" href={joinUrl} target="_blank" rel="noopener noreferrer">
          🎬 Join Movie "Night"
        </a>
      )}
    </div>
  );
}

// ─── MONTH SORT HELPER ───────────────────────────────────────────────────────
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function parseMonthYear(str) {
  if (!str) return 0;
  const clean = str.replace(/[^\w\s]/g, ' ').replace(/\s+/g, ' ').trim();
  const yearMatch = clean.match(/\d{4}/);
  if (!yearMatch) return 0;
  const year = parseInt(yearMatch[0]);
  for (let i = 0; i < MONTH_NAMES.length; i++) {
    if (clean.indexOf(MONTH_NAMES[i]) >= 0) return year * 12 + i;
  }
  return year * 12;
}
