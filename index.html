// ─── BRACKET READ-ONLY PAGE (route /bracket) ─────────────────────────────────
function BracketReadOnlyPage({ bracket, onBack }) {
  if (!bracket || !bracket.finished) {
    return (
      <div className="main">
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:'var(--blue-mid)',fontWeight:600,marginBottom:16,padding:0,fontSize:'0.9rem'}}>← Back to Poll</button>
        <div className="empty-state"><div className="empty-icon">🏆</div><div>No finished bracket to view.</div></div>
      </div>
    );
  }
  return (
    <div className="main">
      <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:'var(--blue-mid)',fontWeight:600,marginBottom:16,padding:0,fontSize:'0.9rem'}}>← Back to Poll</button>
      <div className="page-title">The Bracket</div>
      <div className="page-subtitle">Final results</div>
      <div className="bracket-winner">
        <div className="winner-label">🏆 Winner</div>
        <div className="winner-title">{bracket.winner}</div>
      </div>
      {bracket.rounds.map((round, rIdx) => (
        <div key={rIdx} style={{marginBottom:20}}>
          <div style={{fontSize:'0.7rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'2px',color:'#aaa',marginBottom:10}}>
            Round {rIdx + 1}{rIdx === bracket.rounds.length - 1 ? ' (Final)' : ''}
          </div>
          {round.map((matchup, i) => {
            const isBye = matchup.b === 'BYE';
            const votes = matchup.votes || {};
            const aVotes = Object.values(votes).filter(v => v === matchup.a).length;
            const bVotes = Object.values(votes).filter(v => v === matchup.b).length;
            const roundWinner = isBye ? matchup.a : (aVotes >= bVotes ? matchup.a : matchup.b);
            return (
              <div key={i} className="matchup-card">
                <div className="matchup-header">Matchup {i + 1}</div>
                {isBye ? (
                  <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px 12px'}}>
                    {matchup.aPoster && <img src={matchup.aPoster} style={{width:34,height:51,objectFit:'cover',borderRadius:4,flexShrink:0}} alt="" />}
                    <span style={{fontWeight:700,fontSize:'0.9rem',flex:1}}>{matchup.a}</span>
                    <span style={{fontSize:'0.78rem',color:'var(--green)',fontWeight:700}}>Auto-advanced</span>
                  </div>
                ) : (
                  <div className="matchup-options">
                    <div className={`vote-btn-h${roundWinner===matchup.a?' voted':' lost'}`} style={{cursor:'default'}}>
                      {matchup.aPoster && <img src={matchup.aPoster} style={{width:44,height:66,objectFit:'cover',borderRadius:5,marginBottom:5,flexShrink:0}} alt="" />}
                      <span style={{fontSize:'0.82rem',lineHeight:1.3,textAlign:'center',wordBreak:'break-word'}}>{matchup.a}</span>
                      <span style={{fontSize:'0.7rem',color:roundWinner===matchup.a?'inherit':'#aaa',marginTop:3}}>{aVotes} vote{aVotes!==1?'s':''}</span>
                    </div>
                    <div className="matchup-vs">VS</div>
                    <div className={`vote-btn-h${roundWinner===matchup.b?' voted':' lost'}`} style={{cursor:'default'}}>
                      {matchup.bPoster && <img src={matchup.bPoster} style={{width:44,height:66,objectFit:'cover',borderRadius:5,marginBottom:5,flexShrink:0}} alt="" />}
                      <span style={{fontSize:'0.82rem',lineHeight:1.3,textAlign:'center',wordBreak:'break-word'}}>{matchup.b}</span>
                      <span style={{fontSize:'0.7rem',color:roundWinner===matchup.b?'inherit':'#aaa',marginTop:3}}>{bVotes} vote{bVotes!==1?'s':''}</span>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ─── POLL PAGE ────────────────────────────────────────────────────────────────
function PollPage({ polls, bracket, bracketHistory, members, onPollUpdate, onBracketUpdate, adminAuthed, onNavigate, onPollsAdd, onPollsRemove }) {
  const { currentUser } = React.useContext(UserContext);
  const newPollAsker = currentUser?.id ? currentUser.name : '';
  const [tab, setTab] = useState('live');
  const [showBracketSetup, setShowBracketSetup] = useState(false);
  const [showCreatePoll, setShowCreatePoll] = useState(false);
  const [newQuestion, setNewQuestion] = useState('');
  const [creating, setCreating] = useState(false);
  const [createErr, setCreateErr] = useState('');

  const activePoll = (polls || []).find(p => p.is_active);
  const pastPolls = (polls || []).filter(p => !p.is_active).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  const activeBracket = bracket && !bracket.finished ? bracket : null;

  async function handleCreatePoll() {
    if (!newPollAsker) { setCreateErr('Pick your identity first'); return; }
    if (!newQuestion.trim()) { setCreateErr('Enter a question first'); return; }
    setCreating(true); setCreateErr('');
    try {
      const newPoll = await dbCreatePoll(newQuestion.trim(), newPollAsker);
      if (onPollsAdd) onPollsAdd(newPoll);
      setNewQuestion('');
      setShowCreatePoll(false);
    } catch(e) { setCreateErr('Error: ' + e.message); }
    setCreating(false);
  }

  return (
    <div className="main">
      <div className="page-title">Poll</div>
      <div className="page-subtitle">Vote on what's next</div>

      <div className="ratings-tabs" style={{marginBottom:20}}>
        <button className={`ratings-tab ${tab==='live'?'active':''}`} onClick={()=>setTab('live')}>Live</button>
        <button className={`ratings-tab ${tab==='past'?'active':''}`} onClick={()=>setTab('past')}>Past</button>
      </div>

      {tab === 'live' && (
        <>
          {/* Ask a question — always at top when no bracket */}
          {!activeBracket && !activePoll && !showCreatePoll && (
            <button className="setup-bracket-btn" style={{marginTop:0,padding:'14px 16px',fontSize:'1rem',marginBottom:16}}
              onClick={()=>setShowCreatePoll(true)}>
              + Ask a question
            </button>
          )}

          {!activeBracket && showCreatePoll && (
            <div style={{marginBottom:16,background:'white',border:'2px solid var(--blue)',borderRadius:8,padding:16,boxShadow:'3px 3px 0 var(--yellow)'}}>
              <div style={{fontWeight:700,marginBottom:12,fontSize:'1rem'}}>New Poll</div>
              <ActingAs />
              <label className="form-label">Your question</label>
              <input className="form-input" value={newQuestion} onChange={e=>setNewQuestion(e.target.value)}
                placeholder="Ask the group anything…"
                onKeyDown={e=>e.key==='Enter'&&handleCreatePoll()} />
              {createErr && <div style={{color:'var(--red)',fontSize:'0.8rem',marginBottom:8}}>{createErr}</div>}
              <div style={{display:'flex',gap:8}}>
                <button className="home-save-btn" style={{flex:1,padding:'8px'}} onClick={handleCreatePoll}
                  disabled={!newQuestion.trim()||!newPollAsker||creating}>
                  {creating ? '…' : 'Post Poll'}
                </button>
                <button className="home-cancel-btn" onClick={()=>{setShowCreatePoll(false);setNewQuestion('');setCreateErr('');}}>Cancel</button>
              </div>
            </div>
          )}

          {activeBracket ? (
            <BracketVoteView bracket={activeBracket} members={members} onVoteUpdate={onBracketUpdate} />
          ) : activePoll ? (
            <PollVoteView poll={activePoll} members={members} onUpdate={onPollUpdate}
              adminAuthed={adminAuthed}
              onDelete={async () => {
                try { await dbDeletePoll(activePoll.id); if (onPollsRemove) onPollsRemove(activePoll.id); } catch(e) { console.error(e); }
              }} />
          ) : (
            !showCreatePoll && <div className="empty-state"><div>No active poll yet.</div></div>
          )}

          {adminAuthed && !activeBracket && !showBracketSetup && (
            <button className="setup-bracket-btn" style={{marginTop:8}} onClick={()=>setShowBracketSetup(true)}>
              + Set Up Bracket
            </button>
          )}

          {adminAuthed && showBracketSetup && (
            <BracketSetupForm
              onDone={async (matchups) => {
                const newBracket = { rounds: [matchups], currentRound: 0, finished: false, winner: null };
                try {
                  await dbSaveBracket(newBracket);
                  onBracketUpdate(newBracket);
                  setShowBracketSetup(false);
                } catch(e) { console.error('Error creating bracket:', e); }
              }}
              onCancel={() => setShowBracketSetup(false)}
            />
          )}
        </>
      )}

      {tab === 'past' && (
        <>
          {(bracketHistory || []).map(record => (
            <PastBracketCard key={record.id} bracket={record.data} finishedAt={record.finished_at}
              onViewFull={() => onNavigate(`bracket/${record.id}`)} />
          ))}
          {pastPolls.length === 0 && (bracketHistory || []).length === 0 && (
            <div className="empty-state">
              <div className="empty-icon">📋</div>
              <div>No past polls yet.</div>
            </div>
          )}
          {pastPolls.map(poll => (
            <PastPollCard key={poll.id} poll={poll} members={members}
              onUpdate={updated => onPollUpdate(updated)} />
          ))}
        </>
      )}
    </div>
  );
}

// ─── MOVIE SEARCH ────────────────────────────────────────────────────────────
function MovieSearch({ value, onChange, onSelect, placeholder }) {
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [year, setYear] = useState('');
  const [page, setPage] = useState(1);
  const [hasMore, setHasMore] = useState(false);
  const timer = useRef(null);
  const queryRef = useRef(value);

  useEffect(() => { queryRef.current = value; }, [value]);

  async function fetchResults(query, yr, pg, append) {
    if (query.length < 2) { setResults([]); return; }
    setLoading(true);
    try {
      let url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=en-US&page=${pg}`;
      if (yr && /^\d{4}$/.test(yr.trim())) url += `&year=${yr.trim()}`;
      const res = await fetch(url);
      const data = await res.json();
      const items = (data.results || []);
      setHasMore((data.total_pages || 0) > pg);
      setResults(prev => append ? [...prev, ...items] : items.slice(0, 10));
    } catch(e) { console.error(e); }
    setLoading(false);
  }

  function handleInput(e) {
    const q = e.target.value;
    onChange(q);
    queryRef.current = q;
    setPage(1);
    clearTimeout(timer.current);
    if (q.length < 2) { setResults([]); setHasMore(false); return; }
    timer.current = setTimeout(() => fetchResults(q, year, 1, false), 400);
  }

  function handleYearChange(e) {
    const yr = e.target.value;
    setYear(yr);
    setPage(1);
    clearTimeout(timer.current);
    if (queryRef.current.length >= 2) {
      timer.current = setTimeout(() => fetchResults(queryRef.current, yr, 1, false), 400);
    }
  }

  function loadMore() {
    const next = page + 1;
    setPage(next);
    fetchResults(queryRef.current, year, next, true);
  }

  async function selectMovie(movie) {
    setResults([]); setHasMore(false);
    onChange(movie.title);
    setLoading(true);
    try {
      const provRes = await fetch(`https://api.themoviedb.org/3/movie/${movie.id}/watch/providers?api_key=${TMDB_KEY}`);
      const provData = await provRes.json();
      const flatrate = provData.results?.US?.flatrate || [];
      const streaming = flatrate.map(p => p.provider_name);
      const poster = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : null;
      const yr = movie.release_date ? movie.release_date.split('-')[0] : '';
      onSelect({ title: movie.title, year: yr, description: movie.overview || '', poster, streaming });
    } catch(e) { console.error(e); }
    setLoading(false);
  }

  return (
    <div style={{position:'relative', marginBottom:14}}>
      <input className="form-input" style={{marginBottom:6}} value={value}
        onChange={handleInput} placeholder={placeholder || 'Search for a movie...'} />
      <input className="form-input" style={{marginBottom:0, fontSize:'0.88rem', padding:'6px 10px'}}
        value={year} onChange={handleYearChange} placeholder="Year (optional — helps narrow it down, e.g. 2010)" />
      {loading && (
        <div style={{padding:'6px 12px', fontSize:'0.8rem', color:'#999'}}>Searching...</div>
      )}
      {results.length > 0 && (
        <div style={{position:'absolute',top:'100%',left:0,right:0,background:'white',border:'2px solid var(--ink)',borderTop:'none',borderRadius:'0 0 8px 8px',zIndex:300,boxShadow:'3px 3px 0 var(--ink)',maxHeight:420,overflowY:'auto'}}>
          {results.map(movie => (
            <div key={movie.id} onClick={() => selectMovie(movie)}
              style={{padding:'9px 12px',cursor:'pointer',borderBottom:'1px solid var(--cream)',display:'flex',alignItems:'center',gap:10}}
              onMouseEnter={e => e.currentTarget.style.background='var(--cream)'}
              onMouseLeave={e => e.currentTarget.style.background='white'}>
              {movie.poster_path
                ? <img src={`https://image.tmdb.org/t/p/w92${movie.poster_path}`} style={{width:30,height:45,objectFit:'cover',borderRadius:3,flexShrink:0}} alt="" />
                : <div style={{width:30,height:45,background:'var(--cream)',borderRadius:3,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem'}}>🎬</div>
              }
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:'0.95rem',lineHeight:1.2}}>{movie.title}</div>
                {movie.release_date && <div style={{fontSize:'0.75rem',color:'#888'}}>{movie.release_date.split('-')[0]}</div>}
                {movie.overview && (
                  <div style={{fontSize:'0.72rem',color:'#aaa',marginTop:2,lineHeight:1.3,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>
                    {movie.overview}
                  </div>
                )}
              </div>
            </div>
          ))}
          <div style={{padding:'8px 12px',textAlign:'center',borderTop:'1px solid var(--cream)'}}>
            {hasMore ? (
              <button onClick={loadMore} disabled={loading}
                style={{fontSize:'0.82rem',fontWeight:600,color:'var(--blue-mid)',background:'none',border:'none',cursor:'pointer',padding:'2px 0'}}>
                {loading ? 'Loading…' : '↓ Show more results'}
              </button>
            ) : (
              <span style={{fontSize:'0.75rem',color:'#ccc'}}>
                {results.length} result{results.length !== 1 ? 's' : ''} · try adding a year to narrow it down
              </span>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

  async function handleAdd() {
    if (!selected) { setErr('Search for and select a movie first.'); return; }
    setSaving(true); setErr('');
    try {
      const item = await dbAddToWatchlist({ memberName, title: selected.title, year: selected.year, poster: selected.poster, urgency });
      onAdd(item);
    } catch(e) { setErr('Failed to add: ' + e.message); setSaving(false); }
  }

  return (
    <div className="wl-add-form">
      <div style={{fontWeight:700,fontSize:'1.05rem',marginBottom:12,color:'var(--ink)'}}>Add to Watch List</div>
      <MovieSearch value={search} onChange={setSearch}
        onSelect={d => { setSelected(d); setSearch(d.title); }}
        placeholder="Search for a movie..." />
      {selected && (
        <>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            {selected.poster
              ? <img src={selected.poster} className="mini-poster" alt="" />

              <div style={{fontWeight:700,fontSize:'0.95rem'}}>{selected.title}</div>
              {selected.year && <div style={{fontSize:'0.78rem',color:'#888'}}>{selected.year}</div>}
            </div>
          </div>
          <label className="form-label">How much do you want to watch this?</label>
          <div className="wl-urgency-picker">
            <button className={`wl-urgency-opt ${urgency==='want'?'wl-urgency-want-active':''}`}
              onClick={() => setUrgency('want')}>Want to watch</button>
            <button className={`wl-urgency-opt ${urgency==='really'?'wl-urgency-really-active':''}`}

function WatchedModal({ item, alltime, ratings, onClose }) {
  const { currentUser } = React.useContext(UserContext);
  const ratingMember = currentUser?.id ? currentUser.name : '';
  const existingMovie = (alltime || []).find(m => m.title.toLowerCase() === item.title.toLowerCase());
  const [ratingScore, setRatingScore] = useState('');
  const [saving, setSaving] = useState(false);
  const [done, setDone] = useState('');

  const scoreValid = ratingScore !== '' && !isNaN(parseFloat(ratingScore)) && parseFloat(ratingScore) >= 0 && parseFloat(ratingScore) <= 10;

  async function handleRateSave() {
    if (!ratingMember || !scoreValid || saving) return;
    setSaving(true);
    try {
      await dbSaveRating(existingMovie.id, ratingMember, parseFloat(ratingScore));
      setDone('✓ Rating saved!');
      setTimeout(onClose, 1400);
    } catch(e) { console.error(e); }
    setSaving(false);
  }

  async function handleAddToHistory() {
    setSaving(true);
    try {
      await dbAddHistoryMovie({ title: item.title, year: item.year, poster: item.poster, movieType: 'impromptu' });
      setDone('✓ Added to group history!');
      setTimeout(onClose, 1400);
    } catch(e) { console.error(e); }
    setSaving(false);
  }

  return (
    <div className="confirm-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="confirm-card" style={{maxWidth:360}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          {item.poster
            ? <img src={item.poster} className="mini-poster" alt="" />
            : <div className="mini-poster-placeholder" style={{width:40,height:60,fontSize:'1.2rem'}}>🎬</div>}
          <div>
            <div style={{fontWeight:700,fontSize:'1rem',lineHeight:1.2,color:'var(--ink)'}}>{item.title}</div>
            {item.year && <div style={{fontSize:'0.75rem',color:'#888'}}>{item.year}</div>}
          </div>
        </div>

        {done
          ? <div className="alert alert-success" style={{marginBottom:0}}>{done}</div>
          : existingMovie ? (
            <>
              <div className="confirm-card-title">Record a rating?</div>
              <div className="confirm-card-body">This movie is already in the group's history. Want to add your rating?</div>
              <ActingAs />
              <input type="number" className="form-select" style={{width:'100%',marginBottom:14}} min="0" max="10" step="0.25"
                value={ratingScore} onChange={e => setRatingScore(e.target.value)} placeholder="Score (0–10)" />
              <div className="confirm-actions">
                <button className="confirm-cancel-btn" onClick={onClose}>Skip</button>
                <button className="confirm-delete-btn" style={{background:'var(--blue-mid)',borderColor:'var(--blue-mid)'}}
                  onClick={handleRateSave} disabled={!ratingMember||!scoreValid||saving}>
                  {saving ? '...' : 'Save Rating'}
                </button>
              </div>
            </>
          ) : (
            <>
              <div className="confirm-card-title">Add to group ratings?</div>
              <div className="confirm-card-body">Add <strong>"{item.title}"</strong> to the group's history so everyone can rate it?</div>
              <div className="confirm-actions">
                <button className="confirm-cancel-btn" onClick={onClose}>Skip</button>
                <button className="confirm-delete-btn" style={{background:'var(--blue-mid)',borderColor:'var(--blue-mid)'}}
                  onClick={handleAddToHistory} disabled={saving}>
                  {saving ? '...' : 'Add to History'}
                </button>
              </div>
            </>
          )
        }
      </div>
    </div>
  );
}

function WatchListPage({ members, alltime, ratings }) {
  const { currentUser } = React.useContext(UserContext);
  const initSlug = useRef((() => {
    const parts = window.location.pathname.replace(/^\//, '').split('/');
    return parts[1] ? decodeURIComponent(parts[1]).toLowerCase() : '';
  })());

  const [selectedMember, _setSelectedMember] = useState(() => {
    // URL slug takes priority; fall back to currentUser
    if (initSlug.current) return ''; // resolved after members load via useEffect
    return currentUser?.id ? currentUser.name : '';
  });
  const [list, setList] = useState([]);
  const [loadingList, setLoadingList] = useState(false);
  const [showAddForm, setShowAddForm] = useState(false);
  const [watchedModal, setWatchedModal] = useState(null);
  const [listErr, setListErr] = useState('');
  const [expandedId, setExpandedId] = useState(null);
  const [descs, setDescs] = useState({});
  const [providers, setProviders] = useState({});
  const [membersWithItems, setMembersWithItems] = useState(new Set());

  useEffect(() => {
    dbLoadWatchlist()
      .then(all => setMembersWithItems(new Set(all.filter(i => !i.watched).map(i => i.member_name))))
      .catch(() => {});
  }, []);

  async function fetchDesc(item) {
    if (descs[item.id] !== undefined) return;
    setDescs(prev => ({ ...prev, [item.id]: null }));
    setProviders(prev => ({ ...prev, [item.id]: null }));
    try {
      let url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(item.title)}&language=en-US&page=1`;
      if (item.year) url += `&year=${item.year}`;
      const res = await fetch(url);
      const data = await res.json();
      const first = (data.results || [])[0];
      setDescs(prev => ({ ...prev, [item.id]: first?.overview || '' }));
      if (first?.id) {
        try {
          const wpRes = await fetch(`https://api.themoviedb.org/3/movie/${first.id}/watch/providers?api_key=${TMDB_KEY}`);
          const wpData = await wpRes.json();
          const us = wpData?.results?.US || {};
          const flat = (us.flatrate || []).map(p => p.provider_name);
          setProviders(prev => ({ ...prev, [item.id]: flat }));
        } catch(e) {
          setProviders(prev => ({ ...prev, [item.id]: [] }));
        }
      } else {
        setProviders(prev => ({ ...prev, [item.id]: [] }));
      }
    } catch(e) {
      setDescs(prev => ({ ...prev, [item.id]: '' }));
      setProviders(prev => ({ ...prev, [item.id]: [] }));
    }
  }

  function toggleExpand(item) {
    const next = expandedId === item.id ? null : item.id;
    setExpandedId(next);
    if (next !== null) fetchDesc(item);
  }

  // Resolve URL slug → actual member name once members list loads
  useEffect(() => {
    if (!initSlug.current || selectedMember) return;
    const match = (members || []).find(m => m.toLowerCase() === initSlug.current);
    if (match) _setSelectedMember(match);
  }, [members]);

  // Sync back when browser navigates (back/forward)
  useEffect(() => {
    function onPop() {
      const parts = window.location.pathname.replace(/^\//, '').split('/');
      const slug = parts[1] ? decodeURIComponent(parts[1]).toLowerCase() : '';
      const match = slug ? (members || []).find(m => m.toLowerCase() === slug) || '' : '';
      _setSelectedMember(match);
    }
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, [members]);

  function selectMember(name) {
    const next = selectedMember === name ? '' : name;
    _setSelectedMember(next);
    window.history.pushState(null, '', next ? `/watchlist/${next.toLowerCase()}` : '/watchlist');
    if (!next) setShowAddForm(false);
  }

  useEffect(() => {
    if (!selectedMember) { setList([]); return; }
    setLoadingList(true);
    setListErr('');
    dbLoadWatchlist()
      .then(all => setList(all.filter(i => i.member_name === selectedMember)))
      .catch(e => setListErr(e.message))
      .finally(() => setLoadingList(false));
  }, [selectedMember]);

  async function handleWatched(item) {
    setList(prev => prev.map(i => i.id === item.id ? { ...i, watched: true } : i));
    try { await dbMarkWatchlistWatched(item.id); } catch(e) { console.error(e); }
    setWatchedModal(item);
  }

  async function handleRemove(item) {
    const remaining = list.filter(i => i.id !== item.id && !i.watched);
    setList(prev => prev.filter(i => i.id !== item.id));
    if (remaining.length === 0) {
      setMembersWithItems(prev => { const s = new Set(prev); s.delete(selectedMember); return s; });
    }
    try { await dbRemoveFromWatchlist(item.id); } catch(e) { console.error(e); }
  }

  // REALLY (unwatched) first → want (unwatched) → watched at bottom
  const sorted = [...list].sort((a, b) => {
    if (a.watched !== b.watched) return a.watched ? 1 : -1;
    if (a.urgency === b.urgency) return 0;
    return a.urgency === 'really' ? -1 : 1;
  });

  return (
    <div className="main">
      <div className="page-title">Watch List</div>
      <div className="page-subtitle">What to watch next</div>

      <div className="wl-member-grid">
        {(members || []).map(m => (
          <button key={m}
            className={`wl-member-btn ${selectedMember === m ? 'active' : membersWithItems.has(m) ? 'has-items' : ''}`}
            onClick={() => selectMember(m)}>
            {m}
          </button>
        ))}
      </div>

      {selectedMember && (
        <>
          {showAddForm
            ? <WatchListAddForm memberName={selectedMember}
                onAdd={item => { setList(prev => [...prev, item]); setShowAddForm(false); setMembersWithItems(prev => new Set([...prev, selectedMember])); }}
                onCancel={() => setShowAddForm(false)} />
            : <button className="wl-add-btn" onClick={() => setShowAddForm(true)}>＋ Add a movie</button>
          }

          {loadingList && <div style={{textAlign:'center',padding:20,color:'#aaa'}}>Loading…</div>}
          {listErr && <div className="alert alert-error">{listErr}</div>}

          {!loadingList && !listErr && sorted.length === 0 && (
            <div className="empty-state">
              <div>{selectedMember}'s watch list is empty.<br/>Add some movies above!</div>
            </div>
          )}

          {sorted.map(item => {
            const isReally   = item.urgency === 'really' && !item.watched;
            const isWatched  = item.watched;
            const isExpanded = expandedId === item.id;
            return (
              <div key={item.id}
                className={`wl-item${isReally?' wl-item-really':''}${isWatched?' wl-item-watched':''}`}
                style={{flexWrap:'wrap', cursor:'pointer'}}
                onClick={() => toggleExpand(item)}>
                {item.poster
                  ? <img src={item.poster} className="wl-poster" alt="" />
                  : <div className="wl-poster-placeholder">🎬</div>}
                <div className="wl-info">
                  <div className="wl-title">{item.title}</div>
                  {item.year && <div className="wl-year">{item.year}</div>}
                  <span className={`wl-urgency-tag ${isWatched?'wl-tag-watched':isReally?'wl-tag-really':'wl-tag-want'}`}>
                    {isWatched ? 'Watched' : isReally ? 'REALLY want' : 'Want to watch'}
                  </span>
                </div>
                <div className="wl-actions" onClick={e => e.stopPropagation()}>
                  {!isWatched && (
                    <button className="wl-btn wl-btn-watched" onClick={() => handleWatched(item)}>Watched</button>
                  )}
                  <button className="wl-btn wl-btn-remove" onClick={() => handleRemove(item)}>Remove</button>
                </div>
                {isExpanded && (
                  <div style={{flexBasis:'100%', padding:'8px 14px 12px', borderTop:'1px solid var(--cream)', fontSize:'0.83rem', color:'#555', lineHeight:1.55, position:'relative', zIndex:1}}>
                    {descs[item.id] === undefined || descs[item.id] === null
                      ? <span style={{color:'#bbb'}}>Loading…</span>
                      : descs[item.id] || <span style={{color:'#bbb'}}>No description available.</span>
                    }
                    {providers[item.id] != null && (
                      <div style={{marginTop:10}}>
                        <div className="where-label">Where to watch</div>
                        {providers[item.id].length > 0
                          ? <div className="streaming-chips">
                              {providers[item.id].map((p, i) => (
                                <span key={i} className="chip" style={{background:'rgba(232,168,124,0.15)', borderColor:'#e8a87c', color:'#c17a3a'}}>{p}</span>
                              ))}
                            </div>
                          : <span style={{color:'#bbb'}}>Not free on any subscription service — likely available to rent.</span>
                        }
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </>
      )}

      {watchedModal && (
        <WatchedModal item={watchedModal} alltime={alltime} ratings={ratings}
          onClose={() => setWatchedModal(null)} />
      )}
    </div>
  );
}

function AdminPanel({ onClose, movies, setMovies, members, setMembers, bracket, setBracket, alltime, setAlltime, ratings, setRatings, polls, setPolls, onBracketHistoryAdd }) {
  const [section, setSection] = useState('movies');
  const [msg, setMsg] = useState(null);

  // Poll section state
  const [pollQuestion, setPollQuestion] = useState('');
  const activePollAdmin = (polls || []).find(p => p.is_active);

  async function adminCreatePoll() {
    if (!pollQuestion.trim()) { showMsg('Enter a question', 'error'); return; }
    try {
      const newPoll = await dbCreatePoll(pollQuestion.trim());
      if (setPolls) setPolls(prev => [newPoll, ...(prev || [])]);
      setPollQuestion('');
      showMsg('Poll created!');
    } catch(e) { showMsg('Error: ' + e.message, 'error'); }
  }

  async function adminClosePoll() {
    if (!activePollAdmin) return;
    try {
      await dbClosePoll(activePollAdmin.id);
      if (setPolls) setPolls(prev => (prev || []).map(p => p.id === activePollAdmin.id ? { ...p, is_active: false, closed_at: new Date().toISOString() } : p));
      showMsg('Poll closed!');
    } catch(e) { showMsg('Error: ' + e.message, 'error'); }
  }

  async function adminDeletePoll(pollId) {
    try {
      await dbDeletePoll(pollId);
      if (setPolls) setPolls(prev => (prev || []).filter(p => p.id !== pollId));
      showMsg('Poll deleted.');
    } catch(e) { showMsg('Error: ' + e.message, 'error'); }
  }

  // Movie Night section state
  const [mnOverride,    setMnOverride]    = useState('');
  const [mnCurrent,     setMnCurrent]     = useState(null);
  const [mnJoinUrl,     setMnJoinUrl]     = useState('');
  const [mnJoinCurrent, setMnJoinCurrent] = useState('');
  const [mnLoading,     setMnLoading]     = useState(false);
  useEffect(() => {
    if (section === 'movienight') {
      dbLoadOverride().then(v => setMnCurrent(v));
      dbLoadJoinUrl().then(v => { setMnJoinCurrent(v||''); setMnJoinUrl(v||''); });
    }
  }, [section]);

  // Movies section state
  const [movie1Title, setMovie1Title] = useState(movies[0]?.title || '');
  const [movie1Year, setMovie1Year] = useState(movies[0]?.year || '');
  const [movie1Desc, setMovie1Desc] = useState(movies[0]?.description || '');
  const [movie1Stream, setMovie1Stream] = useState(movies[0]?.streaming?.join(', ') || '');
  const [movie1Scale, setMovie1Scale] = useState(movies[0]?.ratingScale || '');
  const [movie1Poster, setMovie1Poster] = useState(movies[0]?.poster || '');
  const [movie2Title, setMovie2Title] = useState(movies[1]?.title || '');
  const [movie2Year, setMovie2Year] = useState(movies[1]?.year || '');
  const [movie2Desc, setMovie2Desc] = useState(movies[1]?.description || '');
  const [movie2Stream, setMovie2Stream] = useState(movies[1]?.streaming?.join(', ') || '');
  const [movie2Scale, setMovie2Scale] = useState(movies[1]?.ratingScale || '');
  const [movie2Poster, setMovie2Poster] = useState(movies[1]?.poster || '');
  const [sessionThemeInput, setSessionThemeInput] = useState(movies[0]?.sessionTheme || '');

  // Members state
  const [newMember, setNewMember] = useState('');
  const [localMembers, setLocalMembers] = useState([...members]);

  // Bracket state
  const [showAdminBracketSetup, setShowAdminBracketSetup] = useState(false);
  const [editingRound1, setEditingRound1] = useState(false);
  const [round1Edits, setRound1Edits] = useState([]);

  // Edit rating state
  const [editMovieId, setEditMovieId] = useState('');
  const [editMember, setEditMember] = useState('');
  const [editScore, setEditScore] = useState('');

  async function saveEditedRating() {
    if (!editMovieId || !editMember || !editScore) { showMsg('Fill in all fields', 'error'); return; }
    const mid = parseInt(editMovieId);
    const sc = parseFloat(editScore);
    if (isNaN(sc) || sc < 0 || sc > 10) { showMsg('Score must be a number 0–10', 'error'); return; }
    try {
      await dbSaveRating(mid, editMember, sc);
      // Update local ratings state
      if (setRatings) {
        setRatings(prev => ({ ...prev, [mid]: { ...(prev[mid] || {}), [editMember]: sc } }));
      }
      // If archived movie, recalculate avg and update alltime list
      const isArchived = alltime.some(m => m.id === mid);
      if (isArchived) {
        const newAvg = await dbRecalcAvg(mid);
        if (newAvg !== null && setAlltime) {
          setAlltime(prev => prev.map(m => m.id === mid ? { ...m, avgScore: newAvg } : m));
        }
      }
      showMsg(`Rating saved: ${editMember} → ${sc} on movie #${mid}`);
      setEditScore('');
    } catch(e) {
      showMsg('Error: ' + e.message, 'error');
    }
  }

  function showMsg(text, type='success') {
    setMsg({text, type});
    setTimeout(() => setMsg(null), 3000);
  }

  async function saveMovies() {
    const newData = [
      {
        title: movie1Title,
        year: movie1Year,
        description: movie1Desc,
        streaming: movie1Stream.split(',').map(s=>s.trim()).filter(Boolean),
        ratingScale: movie1Scale,
        sessionTheme: sessionThemeInput,
        poster: movie1Poster || null,
        accent: ACCENT_COLORS[0]
      },
      {
        title: movie2Title,
        year: movie2Year,
        description: movie2Desc,
        streaming: movie2Stream.split(',').map(s=>s.trim()).filter(Boolean),
        ratingScale: movie2Scale,

  async function advanceBracket() {
    if (!bracket || bracket.finished) return;
    const round = bracket.rounds[bracket.currentRound];

    // Build winners with poster + vote count for bye assignment
    const winnerObjs = round.map(matchup => {
      if (matchup.b === 'BYE') {
        return { title: matchup.a, poster: matchup.aPoster || null, desc: matchup.aDesc || '', voteCount: 0 };
      }
      const votes = matchup.votes || {};
      const aVotes = Object.values(votes).filter(v => v === matchup.a).length;
      const bVotes = Object.values(votes).filter(v => v === matchup.b).length;
      const isA = aVotes >= bVotes;
      return { title: isA ? matchup.a : matchup.b, poster: isA ? (matchup.aPoster||null) : (matchup.bPoster||null), desc: isA ? (matchup.aDesc||'') : (matchup.bDesc||''), voteCount: isA ? aVotes : bVotes };
    });

    if (winnerObjs.length === 1) {
      const final = { ...bracket, finished: true, winner: winnerObjs[0].title };
      try {
        await dbSaveBracket(final);
        const record = await dbSaveBracketHistory(final);
        setBracket(final);
        if (onBracketHistoryAdd && record) onBracketHistoryAdd({ id: record.id, data: final, finished_at: record.finished_at });
        showMsg(`🏆 ${winnerObjs[0].title} wins!`);
      } catch(e) {
        showMsg('Error: ' + e.message, 'error');
      }
      return;
    }

    // If odd winners, give the bye to the one with the most votes
    if (winnerObjs.length % 2 !== 0) {
      const maxVotes = Math.max(...winnerObjs.map(w => w.voteCount));
      const byeIdx = winnerObjs.findIndex(w => w.voteCount === maxVotes);
      const [byeWinner] = winnerObjs.splice(byeIdx, 1);
      winnerObjs.push(byeWinner);
    }

    const nextMatchups = [];
    for (let i = 0; i < winnerObjs.length; i += 2) {
      if (i + 1 < winnerObjs.length) {
        nextMatchups.push({ a: winnerObjs[i].title, aPoster: winnerObjs[i].poster, aDesc: winnerObjs[i].desc||'', b: winnerObjs[i+1].title, bPoster: winnerObjs[i+1].poster, bDesc: winnerObjs[i+1].desc||'', votes: {} });
      } else {
        nextMatchups.push({ a: winnerObjs[i].title, aPoster: winnerObjs[i].poster, aDesc: winnerObjs[i].desc||'', b: 'BYE', bPoster: null, bDesc: '', votes: {} });
      }
    }
    const updated = { ...bracket, rounds: [...bracket.rounds, nextMatchups], currentRound: bracket.currentRound + 1 };
    try {
      await dbSaveBracket(updated);
      setBracket(updated);
      showMsg('Advanced to next round!');
    } catch(e) {
      showMsg('Error: ' + e.message, 'error');
    }
  }

  async function shuffleRound1() {
    const pool = [];
    for (const m of bracket.rounds[0]) {
      pool.push({ title: m.a, poster: m.aPoster || null, desc: m.aDesc || '' });
      if (m.b !== 'BYE') pool.push({ title: m.b, poster: m.bPoster || null, desc: m.bDesc || '' });
    }
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const newMatchups = [];
    for (let i = 0; i < pool.length; i += 2) {
      if (i + 1 < pool.length) {
        newMatchups.push({ a: pool[i].title, aPoster: pool[i].poster, aDesc: pool[i].desc, b: pool[i+1].title, bPoster: pool[i+1].poster, bDesc: pool[i+1].desc, votes: {} });
      } else {
        newMatchups.push({ a: pool[i].title, aPoster: pool[i].poster, aDesc: pool[i].desc, b: 'BYE', bPoster: null, bDesc: '', votes: {} });
      }
    }
    const updated = { ...bracket, rounds: [newMatchups, ...bracket.rounds.slice(1)] };
    try {
      await dbSaveBracket(updated);
      setBracket(updated);
      showMsg('Bracket shuffled!');
    } catch(e) { showMsg('Error: ' + e.message, 'error'); }
  }

            </div>
            <label className="form-label">Google Meet / Zoom URL</label>
            <input className="form-input" type="url" value={mnJoinUrl}
              onChange={e => setMnJoinUrl(e.target.value)}
              placeholder="https://meet.google.com/..." />
            <button className="btn-primary" disabled={mnLoading} onClick={async () => {
              setMnLoading(true);
              await dbSaveJoinUrl(mnJoinUrl);
              setMnJoinCurrent(mnJoinUrl);
              setMnLoading(false);
              showMsg('Join link saved!');
            }}>
              {mnLoading ? 'Saving…' : 'Save Join Link'}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function LoginPage({ onLogin, onClose }) {
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [err, setErr] = useState('');

  function attempt() {
    if (user === 'foif' && pass === 'Moomoo92') {
      onLogin();
    } else {
      setErr('Wrong username or password.');
    }
  }

  return (
    <div className="login-wrap" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="login-card">
        <button className="login-close" onClick={onClose} aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
        <div className="login-title">🎬 Admin</div>
        <div className="login-sub">Movie Club command center</div>
        {err && <div className="error-msg">{err}</div>}
        <label className="form-label">Username</label>
        <input className="form-input" value={user} onChange={e=>setUser(e.target.value)} autoComplete="username" />
        <label className="form-label">Password</label>
        <input className="form-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&attempt()} autoComplete="current-password" />
        <button className="btn-primary" onClick={attempt}>Enter →</button>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function slugify(str) {
  return (str || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').substring(0, 60);
}

function pageFromPath() {
  const p = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
  if (p === 'ratings') return 'ratings';
  if (p === 'poll' || p.startsWith('poll/')) return 'poll';
  if (p === 'bracket' || p.startsWith('bracket/')) return 'bracket';
  if (p === 'watchlist' || p.startsWith('watchlist/')) return 'watchlist';
  return 'home';
}

// ─── USER PICKER MODAL ───────────────────────────────────────────────────────
function UserPickerModal({ memberObjects, canDismiss, onClose }) {
  const { setCurrentUser } = React.useContext(UserContext);

  function select(userObj) {
    writeUserCookie(userObj);
    setCurrentUser(userObj);
    onClose();
  }

  return (
    <div className="confirm-overlay"
      onClick={e => { if (canDismiss && e.target === e.currentTarget) onClose(); }}>
      <div className="user-picker-card">
        <div className="user-picker-title">Who are you?</div>
        <div className="user-picker-subtitle">Pick your name — your choice carries across every page and reload.</div>
        <div className="user-picker-grid">
          {(memberObjects || []).map(u => (
            <button key={u.id} className="voter-btn" onClick={() => select(u)}>{u.name}</button>
          ))}
          <button className="voter-btn" style={{fontStyle:'italic',opacity:0.75}}
            onClick={() => select({ id: null, name: 'Anonymous' })}>
            A girl has no name
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── ACTING AS ───────────────────────────────────────────────────────────────
function ActingAs() {
  const { currentUser, openUserPicker } = React.useContext(UserContext);
  const display = currentUser?.name || 'Anonymous';
  return (
    <div className="acting-as">
      Acting as <strong>{display}</strong>.{' '}
      <button className="acting-as-change" onClick={openUserPicker}>change</button>
    </div>
  );
}

function App() {
  const [page, _setPage] = useState(pageFromPath);
  const [adminOpen, setAdminOpen] = useState(false);
  const [adminAuthed, setAdminAuthed] = useState(false);
  const [showLogin, setShowLogin] = useState(false);

  const [scrolled, setScrolled] = useState(false);
  const [footerVisible, setFooterVisible] = useState(false);
  const footerRef = useRef(null);

  const [movies, setMovies] = useState([]);
  const [ratings, setRatings] = useState({});
  const [bracket, setBracket] = useState(null);
  const [bracketHistory, setBracketHistory] = useState([]);
  const [bracketViewId, setBracketViewId] = useState(() => {
    const match = window.location.pathname.match(/^\/bracket\/(\d+)/);
    return match ? parseInt(match[1]) : null;
  });
  const [members, setMembers] = useState([]);
  const [memberObjects, setMemberObjects] = useState([]);
  const [alltime, setAlltime] = useState([]);
  const [polls, setPolls] = useState([]);
  const [loaded, setLoaded] = useState(false);

  const [currentUser, setCurrentUser] = useState(() => readUserCookie());
  const [showUserPicker, setShowUserPicker] = useState(false);
  const [isInitialPick, setIsInitialPick] = useState(false);

  function openUserPicker() {
    setIsInitialPick(false);
    setShowUserPicker(true);
  }

  function updatePoll(updatedPoll) {
    setPolls(prev => (prev || []).map(p => p.id === updatedPoll.id ? updatedPoll : p));
  }

  function setPage(newPage) {
    const path = newPage === 'home' ? '/' : `/${newPage}`;
    window.history.pushState(null, '', path);
    _setPage(newPage.split('/')[0]);
    const bracketMatch = newPage.match(/^bracket\/(\d+)$/);
    setBracketViewId(bracketMatch ? parseInt(bracketMatch[1]) : null);
  }

  useEffect(() => {
    const onPop = () => {
      _setPage(pageFromPath());
      const match = window.location.pathname.match(/^\/bracket\/(\d+)/);
      setBracketViewId(match ? parseInt(match[1]) : null);
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 48);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  useEffect(() => {
    const el = footerRef.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => setFooterVisible(entry.isIntersecting),
      { threshold: 0.15 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, [loaded]);

  useEffect(() => {
    async function load() {
      try {
        const { currentMovies, ratingsData, bracketData, membersData, memberObjectsData, alltimeMovies, pollsData, bracketHistoryData } = await loadAll();
        if (currentMovies.length) setMovies(currentMovies);
        if (Object.keys(ratingsData).length) setRatings(ratingsData);
        if (bracketData) setBracket(bracketData);
        if (bracketHistoryData && bracketHistoryData.length) setBracketHistory(bracketHistoryData);
        if (membersData.length) setMembers(membersData);
        if (memberObjectsData.length) setMemberObjects(memberObjectsData);
        if (alltimeMovies.length) setAlltime(alltimeMovies);
        if (pollsData && pollsData.length) setPolls(pollsData);
      } catch(e) {
        console.error('Failed to load from Supabase:', e);
      }
      setLoaded(true);
    }
    load();
  }, []);

  useEffect(() => {
    if (loaded && readUserCookie() === null) {
      setIsInitialPick(true);
      setShowUserPicker(true);
    }
  }, [loaded]);

  function handleAdminClick() {
    if (adminAuthed) {
      setAdminOpen(true);
    } else {
      setShowLogin(true);
    }
  }

  if (showLogin && !adminAuthed) {
    return <LoginPage onLogin={() => { setAdminAuthed(true); setShowLogin(false); setAdminOpen(true); }} onClose={() => setShowLogin(false)} />;
  }

  if (!loaded) {
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}>
        <div className="spinner" />
      </div>
    );
  }

  return (
    <UserContext.Provider value={{ currentUser, setCurrentUser, openUserPicker }}>
      <header className={`site-header${scrolled ? ' header-scrolled' : ''}`}>
        <div className={`logo${footerVisible ? ' logo-hidden' : ''}`} onClick={() => setPage('home')}>
          <div className="logo-circle">
            <img src="/movieclub.png" className="logo-img" alt="Movie Club logo" />
          </div>
        </div>
        <nav className="nav">
          <button className={`nav-btn ${page==='home'?'active':''}`} onClick={()=>setPage('home')}>
            <span className="nav-label">Current</span>
            <span className="nav-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></span>
          </button>
          <button className={`nav-btn ${page==='ratings'?'active':''}`} onClick={()=>setPage('ratings')}>
            <span className="nav-label">Ratings</span>
            <span className="nav-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></span>
          </button>
          <button className={`nav-btn ${page==='poll'||page==='bracket'?'active':''}`} onClick={()=>setPage('poll')}>
            <span className="nav-label">Poll</span>
            <span className="nav-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg></span>
          </button>
        </nav>
        <button className="user-chip" onClick={openUserPicker} title="Change identity">
          {currentUser?.id ? currentUser.name : '?'}
        </button>
      </header>

      {page === 'home' && <HomePage movies={movies} ratings={ratings} setRatings={setRatings} members={members}
        activePoll={(polls||[]).find(p=>p.is_active)} onPollClick={q=>setPage('poll/' + slugify(q))}
        bracket={bracket} onBracketClick={()=>setPage('poll')} />}
      {page === 'ratings' && <RatingsPage movies={movies} ratings={ratings} setRatings={setRatings} alltime={alltime} setAlltime={setAlltime} members={members} adminAuthed={adminAuthed} />}
      {page === 'poll' && <PollBoundary>
        <PollPage polls={polls} bracket={bracket} bracketHistory={bracketHistory} members={members}
          onPollUpdate={updatePoll}
          onPollsAdd={newPoll => setPolls(prev => [newPoll, ...(prev || [])])}
          onPollsRemove={pollId => setPolls(prev => (prev || []).filter(p => p.id !== pollId))}
          onBracketUpdate={setBracket} adminAuthed={adminAuthed} onNavigate={setPage} />
      </PollBoundary>}
      {page === 'bracket' && <BracketReadOnlyPage
        bracket={bracketViewId ? (bracketHistory.find(h => h.id === bracketViewId) || {}).data || null : bracket}
        onBack={() => { setBracketViewId(null); setPage('poll'); }} />}
      {page === 'watchlist' && <WatchListPage members={members} alltime={alltime} ratings={ratings} />}

      <div className="footer-logo-section" ref={footerRef}
        onClick={() => { setPage('home'); window.scrollTo({ top: 0, behavior: 'smooth' }); }}>
        <div className="footer-logo-circle">
          <img src="/movieclub.png" alt="Movie Club" />
        </div>
      </div>

      <div style={{textAlign:'center', paddingBottom:48}}>
        <button style={{background:'none',border:'none',cursor:'pointer',color:'#bbb',fontSize:'0.75rem',padding:'6px 16px',letterSpacing:'0.5px'}}
          onClick={handleAdminClick}>admin</button>
      </div>

      <button className="fab" onClick={() => setPage('watchlist')} title="Watch List">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18 3v2h-2V3H8v2H6V3H4v18h2v-2h2v2h8v-2h2v2h2V3h-2zM8 17H6v-2h2v2zm0-4H6v-2h2v2zm0-4H6V7h2v2zm10 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2z"/>
        </svg>
      </button>

      {adminOpen && adminAuthed && (
        <AdminPanel
          onClose={() => setAdminOpen(false)}
          movies={movies} setMovies={setMovies}
          members={members} setMembers={setMembers}
          bracket={bracket} setBracket={setBracket}
          alltime={alltime} setAlltime={setAlltime}
          ratings={ratings} setRatings={setRatings}
          polls={polls} setPolls={setPolls}
          onBracketHistoryAdd={record => setBracketHistory(prev => [record, ...prev])}
        />
      )}

      {showUserPicker && (
        <UserPickerModal
          memberObjects={memberObjects}
          canDismiss={!isInitialPick}
          onClose={() => setShowUserPicker(false)}
        />
      )}
    </UserContext.Provider>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { crashed: false, errorMsg: null }; }
  static getDerivedStateFromError(err) {
    const msg = (err && err.message) ? err.message : String(err);
    return { crashed: true, errorMsg: msg };
  }
  componentDidCatch(err) {
    const msg = (err && err.message) ? err.message : String(err);
    if (!this.state.errorMsg) this.setState({ errorMsg: msg });
  }
  render() {
    if (!this.state.crashed) return this.props.children;
    const msg = this.state.errorMsg || 'Unknown error';
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',textAlign:'center',fontFamily:'sans-serif'}}>
        <div>
          <img src="/movieclub.png" style={{width:64,height:64,objectFit:'contain',marginBottom:16,borderRadius:'50%'}} onError={function(e){e.target.style.display='none';}} alt="" />
          <div style={{fontSize:'1.1rem',fontWeight:700,marginBottom:8}}>Sorry yall! Site's a lil sick.</div>
          <div style={{fontSize:'0.9rem',color:'#888',marginBottom:12}}>Let Ali know and check back soon</div>
          <details style={{fontSize:'0.75rem',color:'#aaa',maxWidth:400,textAlign:'left',cursor:'pointer'}}>
            <summary>Error details</summary>
            <pre style={{whiteSpace:'pre-wrap',wordBreak:'break-all',marginTop:8}}>{msg}</pre>
          </details>
        </div>
      </div>
    );
  }
}

class PollBoundary extends React.Component {
  constructor(props) { super(props); this.state = { crashed: false, errorMsg: null }; }
  static getDerivedStateFromError(err) {
    const msg = (err && err.message) ? err.message : String(err);
    return { crashed: true, errorMsg: msg };
  }
  componentDidCatch(err) {
    const msg = (err && err.message) ? err.message : String(err);
    if (!this.state.errorMsg) this.setState({ errorMsg: msg });
  }
  render() {
    if (!this.state.crashed) return this.props.children;
    const msg = this.state.errorMsg || 'Unknown error';
    return (
      <div style={{padding:'2rem',textAlign:'center',color:'#888'}}>
        <div style={{fontWeight:600,marginBottom:8}}>Polls couldn't load right now</div>
        <details style={{fontSize:'0.75rem',maxWidth:400,margin:'0 auto',textAlign:'left',cursor:'pointer'}}>
          <summary>Error details</summary>
          <pre style={{whiteSpace:'pre-wrap',wordBreak:'break-all',marginTop:8}}>{msg}</pre>
        </details>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
