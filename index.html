<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── SUPABASE ────────────────────────────────────────────────────────────────
// Required SQL — run once in the Supabase SQL editor:
//
// create table movies (

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const ACCENT_COLORS = ['#d63a2f','#2563b8','#2a7a3b','#e8621a','#7c3aed','#b8860b'];

function avg(arr) {
  const nums = arr.filter(n => n > 0);
  if (!nums.length) return null;
  return (nums.reduce((a,b) => a+b, 0) / nums.length).toFixed(1);
}

function ScaleIcon({ theme }) {
  const icons = {
    berets: '🎩', stars: '⭐', skulls: '💀', tacos: '🌮', flames: '🔥', cups: '☕', bombs: '💣'
  };
  return icons[theme] || '⭐';
}

function renderScaleEmoji(theme, count) {
  const icons = {
    berets: '🎩', stars: '⭐', skulls: '💀', tacos: '🌮', flames: '🔥', cups: '☕', bombs: '💣'
  };
  const icon = icons[theme] || '⭐';
  return Array.from({length: count}, (_,i) => icon).join('');
}

// ─── DB HELPERS ──────────────────────────────────────────────────────────────
function rowToMovie(row) {
  return {
    id: row.id,
    title: row.title,
    year: row.year,
    description: row.description,
    poster: row.poster,
    streaming: Array.isArray(row.streaming) ? row.streaming : [],
    accent: row.accent || ACCENT_COLORS[0],
    ratingScale: row.rating_scale || 'stars',
  };
}

async function loadAll() {
  const [moviesRes, ratingsRes, bracketRes, membersRes] = await Promise.all([
    sb.from('movies').select('*').order('id'),
    sb.from('ratings').select('*'),
    sb.from('bracket').select('data').eq('id', 1).maybeSingle(),
    sb.from('members').select('name, sort_order').order('sort_order').order('name'),
  ]);

  const allMovies = moviesRes.data || [];
  const currentMovies = allMovies.filter(m => !m.archived).map(rowToMovie);
  const alltimeMovies = allMovies
    .filter(m => m.archived)
    .sort((a, b) => (b.avg_score || 0) - (a.avg_score || 0))
    .map(row => ({
      id: row.id,
      title: row.title,
      year: row.year,
      ratingScale: row.rating_scale || 'stars',
      avgScore: row.avg_score,
    }));

  const ratingsData = {};
  for (const row of (ratingsRes.data || [])) {
    if (!ratingsData[row.movie_id]) ratingsData[row.movie_id] = {};
    ratingsData[row.movie_id][row.member_name] = row.score;
  }

  const bracketData = bracketRes.data ? bracketRes.data.data : null;
  const membersData = (membersRes.data || []).map(r => r.name);

  return { currentMovies, ratingsData, bracketData, membersData, alltimeMovies };
}

async function dbSaveMovies(existingMovies, newMovieData) {
  const saved = [];
  for (let i = 0; i < newMovieData.length; i++) {
    const m = newMovieData[i];
    const row = {
      title: m.title,
      year: m.year || null,
      description: m.description || null,
      poster: m.poster || null,
      streaming: m.streaming || [],
      accent: m.accent || null,
      rating_scale: m.ratingScale || 'stars',
      archived: false,
    };
    const existing = existingMovies[i];
    if (existing && existing.id) {
      const { data, error } = await sb.from('movies').update(row).eq('id', existing.id).select().single();
      if (error) throw error;
      saved.push(rowToMovie(data));
    } else {
      const { data, error } = await sb.from('movies').insert(row).select().single();
      if (error) throw error;
      saved.push(rowToMovie(data));
    }
  }
  return saved;
}

async function dbSaveRating(movieId, memberName, score) {
  const { error } = await sb.from('ratings').upsert(
    { movie_id: movieId, member_name: memberName, score },
    { onConflict: 'movie_id,member_name' }
  );
  if (error) throw error;
}

async function dbSaveBracket(bracketData) {
  if (!bracketData) {
    await sb.from('bracket').delete().eq('id', 1);
    return;
  }
  const { error } = await sb.from('bracket').upsert({ id: 1, data: bracketData });
  if (error) throw error;
}

async function dbSaveMembers(members) {
  await sb.from('members').delete().not('name', 'is', null);
  if (!members.length) return;
  const rows = members.map((name, i) => ({ name, sort_order: i }));
  const { error } = await sb.from('members').insert(rows);
  if (error) throw error;
}

async function dbArchiveMovies(movies, ratingsData) {
  const archived = [];
  for (const m of movies) {
    const scores = Object.values(ratingsData[m.id] || {}).filter(v => v > 0);
    if (!scores.length) continue;
    const average = parseFloat(avg(scores));
    const { error } = await sb.from('movies')
      .update({ archived: true, avg_score: average })
      .eq('id', m.id);
    if (error) throw error;
    archived.push({ id: m.id, title: m.title, year: m.year, ratingScale: m.ratingScale, avgScore: average });
  }
  return archived;
}

function BracketPage({ bracket, members, onVoteUpdate }) {
  const [selectedMember, setSelectedMember] = useState('');

  if (!bracket || !bracket.rounds || bracket.rounds.length === 0) {
    return (
      <div className="main">
        <div className="page-title">The Bracket</div>
        <div className="page-subtitle">May the best film win</div>
        <div className="empty-state">
          <div className="empty-icon">🏆</div>
          <div>No bracket active yet.<br/>The admin will set one up soon!</div>
        </div>
      </div>
    );
  }

  const currentRound = bracket.currentRound || 0;
  const round = bracket.rounds[currentRound];
  const totalRounds = bracket.rounds.length;
  const isFinished = bracket.finished;
  const winner = bracket.winner;

  async function castVote(matchupIdx, movieTitle) {
    if (!selectedMember) return;
    const updated = JSON.parse(JSON.stringify(bracket));
    const matchup = updated.rounds[currentRound][matchupIdx];
    matchup.votes = matchup.votes || {};
    matchup.votes[selectedMember] = movieTitle;
    try {
      await dbSaveBracket(updated);
    } catch(e) {
      console.error('Failed to save vote:', e);
    }
    onVoteUpdate(updated);
  }

  return (
    <div className="main">
      <div className="page-title">The Bracket</div>
      <div className="page-subtitle">Round {currentRound + 1} of {totalRounds}</div>

      <div className="bracket-status">
        {isFinished ? `🏆 Winner: ${winner}` : `🎬 Round ${currentRound + 1} — Vote now!`}
      </div>

      {isFinished && winner && (
        <div className="bracket-winner">
          <div className="winner-label">🎬 This Month's Pick</div>
          <div className="winner-title">{winner}</div>
        </div>
      )}

      {!isFinished && (
        <>
          <div className="voter-label">Who are you?</div>
          <div className="voter-grid" style={{marginBottom: 20}}>
            {members.map(m => (
              <button key={m} className={`voter-btn ${selectedMember===m?'selected':''}`} onClick={()=>setSelectedMember(m)}>{m}</button>
            ))}
          </div>

          {!selectedMember && (
            <div className="alert alert-error">👆 Pick your name to vote</div>
          )}

          {round && round.map((matchup, i) => {
            const votes = matchup.votes || {};
            const aVotes = Object.values(votes).filter(v => v === matchup.a).length;
            const bVotes = Object.values(votes).filter(v => v === matchup.b).length;
            const total = aVotes + bVotes;
            const myVote = votes[selectedMember];
            return (
              <div key={i} className="matchup-card">
                <div className="matchup-header">Matchup {i + 1}</div>
                <div className="matchup-options">
                  <button
                    className={`vote-btn ${myVote===matchup.a?'voted':''}`}
                    onClick={() => castVote(i, matchup.a)}
                    disabled={!selectedMember}
                  >
                    <span>{matchup.a}</span>
                    {total > 0 && <span className="vote-count">{aVotes} vote{aVotes!==1?'s':''}</span>}
                  </button>
                  <div className="matchup-vs">VS</div>
                  <button
                    className={`vote-btn ${myVote===matchup.b?'voted':''}`}
                    onClick={() => castVote(i, matchup.b)}
                    disabled={!selectedMember}
                  >
                    <span>{matchup.b}</span>
                    {total > 0 && <span className="vote-count">{bVotes} vote{bVotes!==1?'s':''}</span>}
                  </button>
                </div>
                {total > 0 && (
                  <div style={{padding:'0 12px 12px'}}>
                    <div className="progress-bar-wrap">
                      <div className="progress-bar" style={{width: total ? `${(aVotes/total)*100}%` : '50%'}} />
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

// ─── MOVIE SEARCH ────────────────────────────────────────────────────────────
function MovieSearch({ value, onChange, onSelect, placeholder }) {
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const timer = useRef(null);

  function handleInput(e) {
    const q = e.target.value;
    onChange(q);
    clearTimeout(timer.current);
    if (q.length < 2) { setResults([]); return; }
    timer.current = setTimeout(async () => {
      setLoading(true);
      try {
        const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=en-US`);
        const data = await res.json();
        setResults((data.results || []).slice(0, 6));
      } catch(e) { console.error(e); }
      setLoading(false);
    }, 400);
  }

  async function selectMovie(movie) {
    setResults([]);
    onChange(movie.title);
    setLoading(true);
    try {
      const [provRes] = await Promise.all([
        fetch(`https://api.themoviedb.org/3/movie/${movie.id}/watch/providers?api_key=${TMDB_KEY}`)
      ]);
      const provData = await provRes.json();
      const flatrate = provData.results?.US?.flatrate || [];
      const streaming = flatrate.map(p => p.provider_name);
      const poster = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : null;
      const year = movie.release_date ? movie.release_date.split('-')[0] : '';
      onSelect({ title: movie.title, year, description: movie.overview || '', poster, streaming });
    } catch(e) { console.error(e); }
    setLoading(false);
  }

  return (
    <div style={{position:'relative', marginBottom:14}}>
      <input
        className="form-input"
        style={{marginBottom:0}}
        value={value}
        onChange={handleInput}
        placeholder={placeholder || 'Search for a movie...'}
      />
      {loading && (
        <div style={{padding:'6px 12px', fontFamily:"'Special Elite',monospace", fontSize:'0.8rem', color:'#999'}}>
          Searching...
        </div>
      )}
      {results.length > 0 && (
        <div style={{position:'absolute',top:'100%',left:0,right:0,background:'white',border:'3px solid var(--ink)',borderTop:'none',borderRadius:'0 0 8px 8px',zIndex:300,boxShadow:'4px 4px 0 var(--ink)',maxHeight:320,overflowY:'auto'}}>
          {results.map(movie => (
            <div
              key={movie.id}
              onClick={() => selectMovie(movie)}
              style={{padding:'10px 12px',cursor:'pointer',borderBottom:'1px solid var(--cream)',display:'flex',alignItems:'center',gap:10}}
              onMouseEnter={e => e.currentTarget.style.background='var(--cream)'}
              onMouseLeave={e => e.currentTarget.style.background='white'}
            >
              {movie.poster_path
                ? <img src={`https://image.tmdb.org/t/p/w92${movie.poster_path}`} style={{width:32,height:48,objectFit:'cover',borderRadius:3,flexShrink:0}} alt="" />
                : <div style={{width:32,height:48,background:'var(--cream)',borderRadius:3,flexShrink:0}} />
              }
              <div>
                <div style={{fontFamily:"'Permanent Marker',cursive",fontSize:'1rem',lineHeight:1.2}}>{movie.title}</div>
                {movie.release_date && <div style={{fontFamily:"'Special Elite',monospace",fontSize:'0.75rem',color:'#888'}}>{movie.release_date.split('-')[0]}</div>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AdminPanel({ onClose, movies, setMovies, members, setMembers, bracket, setBracket, alltime, setAlltime, ratings }) {

  const [movie1Scale, setMovie1Scale] = useState(movies[0]?.ratingScale || 'stars');
  const [movie1Poster, setMovie1Poster] = useState(movies[0]?.poster || '');
  const [movie2Title, setMovie2Title] = useState(movies[1]?.title || '');
  const [movie2Year, setMovie2Year] = useState(movies[1]?.year || '');
  const [movie2Desc, setMovie2Desc] = useState(movies[1]?.description || '');
  const [movie2Stream, setMovie2Stream] = useState(movies[1]?.streaming?.join(', ') || '');
  const [movie2Scale, setMovie2Scale] = useState(movies[1]?.ratingScale || 'stars');
  const [movie2Poster, setMovie2Poster] = useState(movies[1]?.poster || '');

  // Members state
  const [newMember, setNewMember] = useState('');
  const [localMembers, setLocalMembers] = useState([...members]);

  // Bracket state
  const [bracketMovies, setBracketMovies] = useState('');

  function showMsg(text, type='success') {
    setMsg({text, type});
    setTimeout(() => setMsg(null), 3000);
  }

  async function saveMovies() {
    const newData = [
      {
        title: movie1Title,
        year: movie1Year,
        description: movie1Desc,
        streaming: movie1Stream.split(',').map(s=>s.trim()).filter(Boolean),
        ratingScale: movie1Scale,
        poster: movie1Poster || null,
        accent: ACCENT_COLORS[0]
      },
      {
        title: movie2Title,
        year: movie2Year,
        description: movie2Desc,
        streaming: movie2Stream.split(',').map(s=>s.trim()).filter(Boolean),
        ratingScale: movie2Scale,
        poster: movie2Poster || null,
        accent: ACCENT_COLORS[1]
      }
    ].filter(m => m.title);
    try {
      const saved = await dbSaveMovies(movies, newData);
      setMovies(saved);
      showMsg('Movies saved!');
    } catch(e) {
      showMsg('Error saving: ' + e.message, 'error');
    }
  }

  async function saveMembers() {
    try {
      await dbSaveMembers(localMembers);
      setMembers(localMembers);
      showMsg('Members saved!');
    } catch(e) {
      showMsg('Error saving: ' + e.message, 'error');
    }
  }

  function addMember() {
    if (!newMember.trim()) return;
    setLocalMembers(prev => [...prev, newMember.trim()]);
    setNewMember('');
  }

  function removeMember(name) {
    setLocalMembers(prev => prev.filter(m => m !== name));
  }

  async function buildBracket() {
    const films = bracketMovies.split('\n').map(s=>s.trim()).filter(Boolean);
    if (films.length < 2) { showMsg('Enter at least 2 movies', 'error'); return; }
    const padded = [...films];
    if (padded.length % 2 !== 0) padded.push('BYE');
    const matchups = [];
    for (let i = 0; i < padded.length; i += 2) {
      matchups.push({ a: padded[i], b: padded[i+1], votes: {} });
    }
    const newBracket = { rounds: [matchups], currentRound: 0, finished: false, winner: null };
    try {
      await dbSaveBracket(newBracket);
      setBracket(newBracket);
      showMsg('Bracket created!');
    } catch(e) {
      showMsg('Error: ' + e.message, 'error');
    }
  }

  async function advanceBracket() {
    if (!bracket || bracket.finished) return;
    const round = bracket.rounds[bracket.currentRound];
    const winners = round.map(matchup => {
      const votes = matchup.votes || {};
      const aVotes = Object.values(votes).filter(v => v === matchup.a).length;
      const bVotes = Object.values(votes).filter(v => v === matchup.b).length;
      return aVotes >= bVotes ? matchup.a : matchup.b;
    });

    if (winners.length === 1) {
      const final = { ...bracket, finished: true, winner: winners[0] };
      try {
        await dbSaveBracket(final);
        setBracket(final);
        showMsg(`🏆 ${winners[0]} wins!`);
      } catch(e) {
        showMsg('Error: ' + e.message, 'error');
      }
      return;
    }

    const nextMatchups = [];
    for (let i = 0; i < winners.length; i += 2) {
      if (i + 1 < winners.length) {
        nextMatchups.push({ a: winners[i], b: winners[i+1], votes: {} });
      } else {
        nextMatchups.push({ a: winners[i], b: 'BYE', votes: {} });
      }
    }
    const updated = {
      ...bracket,
      rounds: [...bracket.rounds, nextMatchups],
      currentRound: bracket.currentRound + 1
    };
    try {
      await dbSaveBracket(updated);
      setBracket(updated);
      showMsg('Advanced to next round!');
    } catch(e) {
      showMsg('Error: ' + e.message, 'error');
    }
  }

  async function archiveMovies() {
    try {
      const newArchived = await dbArchiveMovies(movies, ratings);
      if (!newArchived.length) { showMsg('No rated movies to archive', 'error'); return; }
      const updated = [...(alltime || []), ...newArchived];
      setAlltime(updated);
      setMovies(prev => prev.filter(m => !newArchived.find(a => a.id === m.id)));
      showMsg('Movies archived to All Time list!');
    } catch(e) {
      showMsg('Error archiving: ' + e.message, 'error');
    }
  }

  const scaleOptions = ['stars','berets','skulls','tacos','flames','cups','bombs'];

  return (
    <div className="admin-overlay" onClick={e => { if(e.target === e.currentTarget) onClose(); }}>
      <div className="admin-sheet">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:4}}>
          <div>
            <div className="admin-title">⚙️ Admin Panel</div>
            <div className="admin-subtitle">Movie Club command center</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:'1.5rem',cursor:'pointer'}}>✕</button>
        </div>

        <div className="admin-nav">
          {['movies','members','bracket'].map(s => (
            <button key={s} className={`admin-nav-btn ${section===s?'active':''}`} onClick={()=>setSection(s)}>
              {s === 'movies' ? '🎬 Movies' : s === 'members' ? '👥 Members' : '🏆 Bracket'}
            </button>
          ))}
        </div>

        {msg && <div className={`alert alert-${msg.type}`}>{msg.text}</div>}

        {/* MOVIES SECTION */}
        {section === 'movies' && (
          <>
            <div style={{fontFamily:"'Permanent Marker', cursive", fontSize:'1.1rem', marginBottom:12, color:'var(--blue)'}}>Movie 1</div>
            <label className="form-label">Title</label>
            <MovieSearch
              value={movie1Title}
              onChange={setMovie1Title}
              placeholder="Search for a movie..."
              onSelect={d => { setMovie1Title(d.title); setMovie1Year(d.year); setMovie1Desc(d.description); setMovie1Poster(d.poster||''); setMovie1Stream(d.streaming.join(', ')); }}
            />
            <label className="form-label">Year</label>
            <input className="form-input" value={movie1Year} onChange={e=>setMovie1Year(e.target.value)} placeholder="1971" />
            <label className="form-label">Description</label>
            <textarea className="form-input" value={movie1Desc} onChange={e=>setMovie1Desc(e.target.value)} rows={3} placeholder="Short synopsis..." style={{resize:'vertical'}} />
            <label className="form-label">Where to Watch (comma separated)</label>
            <input className="form-input" value={movie1Stream} onChange={e=>setMovie1Stream(e.target.value)} placeholder="Max, Tubi, Netflix" />
            <label className="form-label">Poster URL (optional)</label>
            <input className="form-input" value={movie1Poster} onChange={e=>setMovie1Poster(e.target.value)} placeholder="https://..." />
            <label className="form-label">Rating Scale Theme</label>
            <select className="form-input" value={movie1Scale} onChange={e=>setMovie1Scale(e.target.value)}>
              {scaleOptions.map(s => <option key={s} value={s}>{s} {renderScaleEmoji(s,1)}</option>)}
            </select>

            <hr className="section-divider" />

            <div style={{fontFamily:"'Permanent Marker', cursive", fontSize:'1.1rem', marginBottom:12, color:'var(--orange)'}}>Movie 2</div>
            <label className="form-label">Title</label>
            <MovieSearch
              value={movie2Title}
              onChange={setMovie2Title}
              placeholder="Search for a movie..."
              onSelect={d => { setMovie2Title(d.title); setMovie2Year(d.year); setMovie2Desc(d.description); setMovie2Poster(d.poster||''); setMovie2Stream(d.streaming.join(', ')); }}
            />
            <label className="form-label">Year</label>
            <input className="form-input" value={movie2Year} onChange={e=>setMovie2Year(e.target.value)} placeholder="1964" />
            <label className="form-label">Description</label>
            <textarea className="form-input" value={movie2Desc} onChange={e=>setMovie2Desc(e.target.value)} rows={3} placeholder="Short synopsis..." style={{resize:'vertical'}} />
            <label className="form-label">Where to Watch (comma separated)</label>
            <input className="form-input" value={movie2Stream} onChange={e=>setMovie2Stream(e.target.value)} placeholder="Criterion Channel, Max" />
            <label className="form-label">Poster URL (optional)</label>
            <input className="form-input" value={movie2Poster} onChange={e=>setMovie2Poster(e.target.value)} placeholder="https://..." />
            <label className="form-label">Rating Scale Theme</label>
            <select className="form-input" value={movie2Scale} onChange={e=>setMovie2Scale(e.target.value)}>
              {scaleOptions.map(s => <option key={s} value={s}>{s} {renderScaleEmoji(s,1)}</option>)}
            </select>

            <button className="btn-primary" onClick={saveMovies}>💾 Save Movies</button>
            <button className="btn-secondary" onClick={archiveMovies}>📦 Archive to All Time List</button>
          </>
        )}

        {/* MEMBERS SECTION */}
        {section === 'members' && (
          <>
            <div className="admin-section-title">Club Members</div>
            <div className="tag-list">
              {localMembers.map(m => (
                <div key={m} className="tag">
                  {m}
                  <button className="tag-remove" onClick={()=>removeMember(m)}>×</button>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:8,marginBottom:10}}>
              <input className="form-input" style={{marginBottom:0,flex:1}} value={newMember} onChange={e=>setNewMember(e.target.value)} placeholder="Add member name..." onKeyDown={e=>e.key==='Enter'&&addMember()} />
              <button onClick={addMember} style={{padding:'10px 16px',fontFamily:"'Permanent Marker',cursive",fontSize:'1.2rem',background:'var(--green)',color:'white',border:'3px solid var(--ink)',borderRadius:8,cursor:'pointer'}}>+</button>
            </div>
            <button className="btn-primary" onClick={saveMembers}>💾 Save Members</button>
          </>
        )}

        {/* BRACKET SECTION */}
        {section === 'bracket' && (
          <>
            <div className="admin-section-title">Create Bracket</div>
            <label className="form-label">Enter nominated movies (one per line)</label>
            <textarea className="form-input" rows={8} value={bracketMovies} onChange={e=>setBracketMovies(e.target.value)} placeholder={"The French Connection\nDr. Strangelove\n48 Hrs\nThe Godfather\n..."} style={{resize:'vertical'}} />
            <button className="btn-primary" onClick={buildBracket}>🏆 Build Bracket</button>

            {bracket && bracket.rounds && (
              <>
                <hr className="section-divider" />
                <div className="admin-section-title">Current Bracket</div>
                <div style={{fontFamily:"'Special Elite',monospace",fontSize:'0.85rem',color:'#666',marginBottom:12}}>
                  Round {(bracket.currentRound||0)+1} of {bracket.rounds.length} · {bracket.finished ? '✅ Finished' : '🔴 Active'}
                  {bracket.winner && ` · Winner: ${bracket.winner}`}
                </div>
                {!bracket.finished && (
                  <button className="btn-primary" style={{background:'var(--blue)'}} onClick={advanceBracket}>
                    ➡️ Advance to Next Round
                  </button>
                )}
                {bracket.finished && (
                  <button className="btn-primary" onClick={async () => { await dbSaveBracket(null); setBracket(null); showMsg('Bracket cleared'); }}>
                    🗑️ Clear Bracket
                  </button>
                )}
              </>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [err, setErr] = useState('');

  function attempt() {
    if (user === 'foif' && pass === 'Moomoo92') {
      onLogin();
    } else {
      setErr('Wrong username or password.');
    }
  }

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-title">🎬 Admin</div>
        <div className="login-sub">Movie Club command center</div>
        {err && <div className="error-msg">{err}</div>}
        <label className="form-label">Username</label>
        <input className="form-input" value={user} onChange={e=>setUser(e.target.value)} autoComplete="username" />
        <label className="form-label">Password</label>
        <input className="form-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&attempt()} autoComplete="current-password" />
        <button className="btn-primary" onClick={attempt}>Enter →</button>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [adminOpen, setAdminOpen] = useState(false);
  const [adminAuthed, setAdminAuthed] = useState(false);
  const [showLogin, setShowLogin] = useState(false);

  const [movies, setMovies] = useState([]);
  const [ratings, setRatings] = useState({});
  const [bracket, setBracket] = useState(null);
  const [members, setMembers] = useState([]);
  const [alltime, setAlltime] = useState([]);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    async function load() {
      try {
        const { currentMovies, ratingsData, bracketData, membersData, alltimeMovies } = await loadAll();
        if (currentMovies.length) setMovies(currentMovies);
        if (Object.keys(ratingsData).length) setRatings(ratingsData);
        if (bracketData) setBracket(bracketData);
        if (membersData.length) setMembers(membersData);
        if (alltimeMovies.length) setAlltime(alltimeMovies);
      } catch(e) {
        console.error('Failed to load from Supabase:', e);
      }
      setLoaded(true);
    }
    load();
  }, []);

  function handleAdminClick() {
    if (adminAuthed) {
      setAdminOpen(true);
    } else {
      setShowLogin(true);
    }
  }

  if (showLogin && !adminAuthed) {
    return <LoginPage onLogin={() => { setAdminAuthed(true); setShowLogin(false); setAdminOpen(true); }} />;
  }

  if (!loaded) {
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}>
        <div className="spinner" />
      </div>
    );
  }

  return (
    <>
      <header className="site-header">
        <div className="logo">Movie<span>Club</span></div>
        <nav className="nav">
          <button className={`nav-btn ${page==='home'?'active':''}`} onClick={()=>setPage('home')}>Home</button>
          <button className={`nav-btn ${page==='ratings'?'active':''}`} onClick={()=>setPage('ratings')}>Ratings</button>
          <button className={`nav-btn ${page==='bracket'?'active':''}`} onClick={()=>setPage('bracket')}>Bracket</button>
        </nav>
      </header>

      {page === 'home' && <HomePage movies={movies} />}
      {page === 'ratings' && <RatingsPage movies={movies} ratings={ratings} setRatings={setRatings} alltime={alltime} members={members} />}
      {page === 'bracket' && <BracketPage bracket={bracket} members={members} onVoteUpdate={setBracket} />}

      <button className="fab" onClick={handleAdminClick} title="Admin">⚙️</button>

      {adminOpen && adminAuthed && (
        <AdminPanel
          onClose={() => setAdminOpen(false)}
          movies={movies} setMovies={setMovies}
          members={members} setMembers={setMembers}
          bracket={bracket} setBracket={setBracket}
          alltime={alltime} setAlltime={setAlltime}
          ratings={ratings}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
